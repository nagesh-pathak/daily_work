<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#555"/></marker>
    <filter id="s"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="600" fill="#f8f9fa" rx="6"/>
  <rect x="0" y="0" width="1100" height="50" fill="#7CB342"/>
  <text x="550" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">cdc.splunk-out — Splunk Universal Forwarder Health Wrapper</text>

  <rect x="20" y="65" width="1060" height="35" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="550" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">On-Prem Only — File-based. No Kafka. Wraps cdc.splunkforwarderbase with health monitoring.</text>

  <!-- Architecture -->
  <rect x="20" y="115" width="1060" height="230" rx="8" fill="#F1F8E9" stroke="#7CB342" stroke-width="2" filter="url(#s)"/>
  <text x="550" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#33691E">Architecture</text>

  <rect x="40" y="155" width="200" height="80" rx="6" fill="white" stroke="#E65100" stroke-width="1.5"/>
  <text x="140" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Flume Pipeline</text>
  <text x="55" y="198" font-size="9" fill="#555">Writes CSV files to</text>
  <text x="55" y="213" font-size="9" fill="#555">/infoblox/data/out/splunk/</text>
  <text x="55" y="228" font-size="9" fill="#555">dns, rpz, dhcp data</text>

  <line x1="242" y1="195" x2="278" y2="195" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="280" y="155" width="240" height="80" rx="6" fill="white" stroke="#7CB342" stroke-width="1.5"/>
  <text x="400" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#33691E">Splunk Universal Forwarder</text>
  <text x="295" y="198" font-size="9" fill="#555">monitors /data/out/splunk/ dirs</text>
  <text x="295" y="213" font-size="9" fill="#555">Splunk UF 9.1.0 (from base image)</text>
  <text x="295" y="228" font-size="9" fill="#555">Management: port 8089 (TLS)</text>

  <line x1="522" y1="195" x2="558" y2="195" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="560" y="155" width="220" height="80" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="670" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">Splunk Indexer/Cloud</text>
  <text x="575" y="198" font-size="9" fill="#555">Receives forwarded data</text>
  <text x="575" y="213" font-size="9" fill="#555">Customer's Splunk deployment</text>
  <text x="575" y="228" font-size="9" fill="#555">Port 9997 (default receiver)</text>

  <line x1="782" y1="195" x2="818" y2="195" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="820" y="155" width="240" height="80" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="940" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">cdc.splunk-out (Health)</text>
  <text x="835" y="198" font-size="9" fill="#555">Monitors Splunk UF port 8089</text>
  <text x="835" y="213" font-size="9" fill="#555">TLS mutual auth (client certs)</text>
  <text x="835" y="228" font-size="9" fill="#555">Reports health to cdc.agent</text>

  <!-- Data Directories -->
  <rect x="40" y="250" width="1020" height="80" rx="5" fill="white" stroke="#7CB342" stroke-width="1"/>
  <text x="550" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#33691E">Monitored Data Directories</text>
  <text x="60" y="295" font-size="10" fill="#555">/infoblox/data/out/splunk/nios/dns/</text>
  <text x="340" y="295" font-size="10" fill="#555">/infoblox/data/out/splunk/nios/rpz/</text>
  <text x="620" y="295" font-size="10" fill="#555">/infoblox/data/out/splunk/bloxone/</text>
  <text x="60" y="315" font-size="9" fill="#888">Splunk UF uses monitor:// stanzas in inputs.conf to watch these directories. Files consumed and forwarded automatically.</text>

  <!-- Health Check -->
  <rect x="20" y="365" width="520" height="210" rx="8" fill="#FCE4EC" stroke="#C62828" stroke-width="2" filter="url(#s)"/>
  <text x="280" y="390" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">Health Check Service</text>
  <text x="40" y="415" font-size="10" fill="#555">Endpoint: HTTP :10001/health</text>
  <text x="40" y="438" font-size="10" font-weight="bold" fill="#333">Checks performed:</text>
  <text x="40" y="458" font-size="9" fill="#555">1. Splunk UF management port 8089 reachable (TLS)</text>
  <text x="40" y="474" font-size="9" fill="#555">2. Splunk UF process alive (splunkd PID check)</text>
  <text x="40" y="490" font-size="9" fill="#555">3. Data directories writable</text>
  <text x="40" y="506" font-size="9" fill="#555">4. Forwarding status (outputs.conf active)</text>
  <text x="40" y="530" font-size="10" font-weight="bold" fill="#333">TLS Authentication:</text>
  <text x="40" y="548" font-size="9" fill="#555">Client cert: /infoblox/etc/certs/client.pem</text>
  <text x="40" y="564" font-size="9" fill="#555">Client key: /infoblox/etc/certs/client-key.pem</text>

  <!-- Base Image -->
  <rect x="560" y="365" width="520" height="210" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" filter="url(#s)"/>
  <text x="820" y="390" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">Base Image: cdc.splunkforwarderbase v2.1.3</text>
  <text x="580" y="415" font-size="10" fill="#555">• Splunk Universal Forwarder 9.1.0</text>
  <text x="580" y="435" font-size="10" fill="#555">• Alpine Linux + glibc</text>
  <text x="580" y="455" font-size="10" fill="#555">• supervisord process management</text>
  <text x="580" y="475" font-size="10" fill="#555">• config_writer: template → inputs.conf/outputs.conf</text>
  <text x="580" y="495" font-size="10" fill="#555">• ib_control.reload: dynamic config reload</text>
  <text x="580" y="515" font-size="10" fill="#555">• monitor_hostapp_config.sh: watches for config changes</text>
  <text x="580" y="540" font-size="10" font-weight="bold" fill="#333">Splunk Config Template Variables:</text>
  <text x="580" y="558" font-size="9" fill="#555">index, sourcetype, host, _meta, disabled, followTail</text>
</svg>