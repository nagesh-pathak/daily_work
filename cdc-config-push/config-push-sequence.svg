<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" font-family="Helvetica, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f8a4c"/>
    </marker>
    <style>
      .title  { font-size: 22px; font-weight: 700; }
      .lane   { font-size: 13px; font-weight: 700; fill: #fff; }
      .lblsm  { fill: #222; font-size: 11px; }
      .lblmd  { fill: #222; font-size: 12px; font-weight: 600; }
      .timing { fill: #b3261e; font-size: 11px; font-weight: 700; }
      .ar     { stroke: #333; stroke-width: 1.5; fill: none; }
      .arG    { stroke: #1f8a4c; stroke-width: 1.5; fill: none; }
      .lifeline{ stroke: #888; stroke-width: 1; stroke-dasharray: 4 4; }
      .actBox { fill: #eaf3ff; stroke: #1e6ad6; }
    </style>
  </defs>

  <text x="700" y="34" text-anchor="middle" class="title">CDC Config Push — Sequence &amp; Timings</text>
  <text x="700" y="56" text-anchor="middle" class="lblsm">Happy path. Red = typical wall-clock for that hop.</text>

  <!-- Actor headers -->
  <g>
    <rect x="40"   y="80" width="160" height="36" fill="#1e6ad6"/>
    <text x="120"  y="104" text-anchor="middle" class="lane">User / API client</text>
    <rect x="220"  y="80" width="160" height="36" fill="#1e6ad6"/>
    <text x="300"  y="104" text-anchor="middle" class="lane">cdc.api</text>
    <rect x="400"  y="80" width="160" height="36" fill="#b8860b"/>
    <text x="480"  y="104" text-anchor="middle" class="lane">Postgres cdc_config</text>
    <rect x="580"  y="80" width="160" height="36" fill="#777"/>
    <text x="660"  y="104" text-anchor="middle" class="lane">PubSub / Kafka</text>
    <rect x="760"  y="80" width="180" height="36" fill="#6b3fa0"/>
    <text x="850"  y="104" text-anchor="middle" class="lane">atlas.config.manager</text>
    <rect x="960"  y="80" width="200" height="36" fill="#1f8a4c"/>
    <text x="1060" y="104" text-anchor="middle" class="lane">atlas.onprem.config.service</text>
    <rect x="1180" y="80" width="180" height="36" fill="#b3261e"/>
    <text x="1270" y="104" text-anchor="middle" class="lane">cdc.* container</text>
  </g>

  <!-- Lifelines -->
  <line x1="120"  y1="116" x2="120"  y2="1080" class="lifeline"/>
  <line x1="300"  y1="116" x2="300"  y2="1080" class="lifeline"/>
  <line x1="480"  y1="116" x2="480"  y2="1080" class="lifeline"/>
  <line x1="660"  y1="116" x2="660"  y2="1080" class="lifeline"/>
  <line x1="850"  y1="116" x2="850"  y2="1080" class="lifeline"/>
  <line x1="1060" y1="116" x2="1060" y2="1080" class="lifeline"/>
  <line x1="1270" y1="116" x2="1270" y2="1080" class="lifeline"/>

  <!-- 1: User -> cdc.api -->
  <line x1="120" y1="160" x2="300" y2="160" class="ar" marker-end="url(#arrow)"/>
  <text x="210" y="154" text-anchor="middle" class="lblmd">1. POST /cdc/v1/config/{name}</text>
  <text x="210" y="172" text-anchor="middle" class="lblsm">{ophid, config}</text>

  <!-- 2: cdc.api -> PG dup check -->
  <line x1="300" y1="200" x2="480" y2="200" class="ar" marker-end="url(#arrow)"/>
  <text x="390" y="194" text-anchor="middle" class="lblmd">2. SELECT latest version (dup check)</text>
  <line x1="480" y1="218" x2="300" y2="218" class="ar" marker-end="url(#arrow)"/>
  <text x="490" y="218" class="timing">2–10 ms</text>

  <!-- 3: cdc.api -> PG INSERT -->
  <line x1="300" y1="250" x2="480" y2="250" class="ar" marker-end="url(#arrow)"/>
  <text x="390" y="244" text-anchor="middle" class="lblmd">3. INSERT cdc_config  (trigger sets version)</text>
  <line x1="480" y1="268" x2="300" y2="268" class="ar" marker-end="url(#arrow)"/>
  <text x="490" y="268" class="timing">5–20 ms</text>

  <!-- 4: cdc.api -> PG read-back -->
  <line x1="300" y1="298" x2="480" y2="298" class="ar" marker-end="url(#arrow)"/>
  <text x="390" y="292" text-anchor="middle" class="lblmd">4. read-back row (gorm.Last)</text>
  <line x1="480" y1="316" x2="300" y2="316" class="ar" marker-end="url(#arrow)"/>
  <text x="490" y="316" class="timing">2–10 ms</text>

  <!-- 5: cdc.api -> PubSub -->
  <line x1="300" y1="348" x2="660" y2="348" class="ar" marker-end="url(#arrow)"/>
  <text x="480" y="342" text-anchor="middle" class="lblmd">5. publish PubSubConfigObject{ophid, version, app_name}</text>
  <text x="670" y="348" class="timing">5–30 ms</text>

  <!-- response 200 -->
  <line x1="300" y1="378" x2="120" y2="378" class="ar" marker-end="url(#arrow)"/>
  <text x="210" y="372" text-anchor="middle" class="lblmd">200 OK (with new version)</text>
  <text x="40"  y="378" class="timing">~50 ms total so far</text>

  <!-- 6: PubSub -> manager -->
  <line x1="660" y1="420" x2="850" y2="420" class="ar" marker-end="url(#arrow)"/>
  <text x="755" y="414" text-anchor="middle" class="lblmd">6. consume notification</text>
  <text x="860" y="420" class="timing">50–500 ms</text>

  <!-- 6a: route to in-memory channel (self loop on manager) -->
  <path class="ar" d="M850 450 C 920 450 920 480 850 480" marker-end="url(#arrow)"/>
  <text x="930" y="468" class="lblsm">onpremNotificationCh[ophid] (drop if not connected here)</text>

  <!-- 7: manager -> onprem stream push -->
  <line x1="850" y1="520" x2="1060" y2="520" class="ar" marker-end="url(#arrow)"/>
  <text x="955" y="514" text-anchor="middle" class="lblmd">7. SubscribeResponse over open gRPC stream (TLS, WAN)</text>
  <text x="1070" y="520" class="timing">100–800 ms</text>

  <!-- 8: onprem GetConfig -->
  <line x1="1060" y1="560" x2="850" y2="560" class="ar" marker-end="url(#arrow)"/>
  <text x="955" y="554" text-anchor="middle" class="lblmd">8. GetConfig(ophid, app, version)</text>
  <line x1="850" y1="580" x2="300" y2="580" class="ar" marker-end="url(#arrow)"/>
  <text x="575" y="574" text-anchor="middle" class="lblmd">8a. manager fetches actual JSON from cdc.api (or S3 cache)</text>
  <line x1="300" y1="600" x2="850" y2="600" class="ar" marker-end="url(#arrow)"/>
  <text x="575" y="615" text-anchor="middle" class="lblsm">payload</text>
  <line x1="850" y1="625" x2="1060" y2="625" class="ar" marker-end="url(#arrow)"/>
  <text x="955" y="619" text-anchor="middle" class="lblmd">8b. fragments (4 MB, SHA-1 each)</text>
  <text x="1070" y="625" class="timing">200 ms – several s</text>

  <!-- 9: version compare -->
  <path class="ar" d="M1060 660 C 1140 660 1140 690 1060 690" marker-end="url(#arrow)"/>
  <text x="1150" y="678" class="lblsm">9. compare local /infoblox/cdc/&lt;name&gt;/.version vs received</text>
  <text x="1150" y="694" class="lblsm">    if received ≤ local → SKIP (status_code=0, "Did not apply…")</text>

  <!-- 10: Apply to container -->
  <line x1="1060" y1="730" x2="1270" y2="730" class="ar" marker-end="url(#arrow)"/>
  <text x="1165" y="724" text-anchor="middle" class="lblmd">10. write config + reload (script | restart)</text>
  <line x1="1270" y1="755" x2="1060" y2="755" class="ar" marker-end="url(#arrow)"/>
  <text x="1280" y="755" class="timing">script: 1–5 s · restart: 5–30 s</text>

  <!-- 11: write .version file (self loop) -->
  <path class="ar" d="M1060 785 C 1130 785 1130 815 1060 815" marker-end="url(#arrow)"/>
  <text x="1140" y="803" class="lblsm">11. update /infoblox/cdc/&lt;name&gt;/.version  (the dedup ground truth)</text>

  <!-- 12: SendStatus -->
  <line x1="1060" y1="850" x2="850" y2="850" class="arG" marker-end="url(#arrowG)"/>
  <text x="955" y="844" text-anchor="middle" class="lblmd">12. SendStatus(message, status_code)</text>

  <!-- 12a: manager -> cdc.api UpdateConfigStatus -->
  <line x1="850" y1="880" x2="300" y2="880" class="arG" marker-end="url(#arrowG)"/>
  <text x="575" y="874" text-anchor="middle" class="lblmd">12a. UpdateConfigStatus → cdc.api</text>

  <!-- 13: UPDATE -->
  <line x1="300" y1="910" x2="480" y2="910" class="arG" marker-end="url(#arrowG)"/>
  <text x="390" y="904" text-anchor="middle" class="lblmd">13. UPDATE cdc_config SET message=?, status_code=?</text>
  <text x="490" y="910" class="timing">5–15 ms</text>

  <!-- summary box -->
  <rect x="40" y="950" width="1320" height="120" class="actBox" rx="8" ry="8"/>
  <text x="60" y="975" class="lblmd">Wall-clock from POST 200 → status_code 99 → 0 in cdc_config:</text>
  <text x="60" y="995" class="lblsm">  • ReloadPolicy=script  → ~2–5 s typical</text>
  <text x="60" y="1011" class="lblsm">  • ReloadPolicy=restart → ~10–35 s typical (container restart dominates)</text>
  <text x="60" y="1027" class="lblsm">  • If notification was dropped (ophid not on this manager pod) → up to 15 min until reconcile</text>
  <text x="60" y="1043" class="lblsm">  • If local .version ≥ received → never flips; row carries message "Did not apply config as &lt;name&gt; has same/newer version X" with status_code=0 immediately</text>
  <text x="60" y="1062" class="lblmd" fill="#b3261e">→ This last case is the most common reason "DB has the latest version but onprem looks stale".</text>
</svg>
