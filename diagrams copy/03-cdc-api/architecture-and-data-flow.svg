<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#555"/></marker>
    <filter id="s"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1200" height="850" fill="#f8f9fa" rx="6"/>
  <rect x="0" y="0" width="1200" height="50" fill="#6A1B9A"/>
  <text x="600" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">cdc.api — Container Configuration Management Service</text>

  <!-- Client Apps -->
  <rect x="30" y="70" width="240" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" filter="url(#s)"/>
  <text x="150" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Client Applications</text>
  <text x="150" y="115" text-anchor="middle" font-size="9" fill="#555">App Service, Flow Configurator, Traffic Config Mgr</text>

  <!-- Flow API -->
  <rect x="300" y="70" width="200" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">CDC Flow API Service</text>
  <text x="400" y="110" text-anchor="middle" font-size="9" fill="#555">gRPC: ReadFlow, ReadSource, ReadDest</text>
  <text x="400" y="122" text-anchor="middle" font-size="9" fill="#555">ReadETL (metadata bearer auth)</text>

  <!-- CDC API Service Box -->
  <rect x="30" y="150" width="740" height="310" rx="8" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2" filter="url(#s)"/>
  <text x="400" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">cdc.api Service (Gateway: 8080, gRPC: 9090, Dapr: 8082)</text>

  <!-- Config APIs -->
  <rect x="50" y="195" width="220" height="120" rx="5" fill="white" stroke="#6A1B9A" stroke-width="1"/>
  <text x="160" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">Configuration APIs</text>
  <text x="60" y="230" font-size="9" fill="#555">POST /cdc/v1/config/{container}</text>
  <text x="60" y="244" font-size="9" fill="#555">GET  /cdc/v1/config/{c}/{ophid}/latest</text>
  <text x="60" y="258" font-size="9" fill="#555">GET  /cdc/v1/config/{c}/{ophid}/{ver}</text>
  <text x="60" y="272" font-size="9" fill="#555">DELETE /cdc/v1/config/{c}/{ophid}</text>
  <text x="60" y="290" font-size="8" fill="#888">Auto-version, duplicate detect (409)</text>
  <text x="60" y="302" font-size="8" fill="#888">Delete = new entry with {"delete":"true"}</text>

  <!-- ETL APIs -->
  <rect x="290" y="195" width="220" height="120" rx="5" fill="white" stroke="#6A1B9A" stroke-width="1"/>
  <text x="400" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">ETL Filter APIs</text>
  <text x="300" y="230" font-size="9" fill="#555">POST /cdc/v1/etl/{container}</text>
  <text x="300" y="244" font-size="9" fill="#555">GET  /cdc/v1/etl/{c}/{ophid}</text>
  <text x="300" y="258" font-size="9" fill="#555">PUT  /cdc/v1/etl/{container}</text>
  <text x="300" y="272" font-size="9" fill="#555">DELETE /cdc/v1/etl/{c}/{ophid}</text>
  <text x="300" y="290" font-size="8" fill="#888">Dest-only: client_ip[], dns_view[],</text>
  <text x="300" y="302" font-size="8" fill="#888">query[], member[] filters</text>

  <!-- Status APIs -->
  <rect x="530" y="195" width="220" height="120" rx="5" fill="white" stroke="#6A1B9A" stroke-width="1"/>
  <text x="640" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">Status &amp; Flow APIs</text>
  <text x="540" y="230" font-size="9" fill="#555">POST /cdc/v1/status/{container}</text>
  <text x="540" y="244" font-size="9" fill="#555">GET  /cdc/v1/config/status/{o}/{c}</text>
  <text x="540" y="265" font-size="9" fill="#888">Dapr Subscriber (port 8082):</text>
  <text x="540" y="279" font-size="9" fill="#555">Topic: cdc-flow-{env}</text>
  <text x="540" y="293" font-size="9" fill="#555">Group: cdc-api-group</text>
  <text x="540" y="307" font-size="9" fill="#555">Receives flow CREATE/DELETE/UPDATE</text>

  <!-- Container types -->
  <rect x="50" y="330" width="710" height="120" rx="5" fill="white" stroke="#795548" stroke-width="1"/>
  <text x="400" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#795548">Container Types &amp; Config Flow</text>
  <text x="70" y="370" font-size="10" fill="#1565C0" font-weight="bold">Source Containers:</text>
  <text x="210" y="370" font-size="9" fill="#555">dns_in | rpz_in | ipmeta_in | grpc_in</text>
  <text x="70" y="390" font-size="10" fill="#C62828" font-weight="bold">Destination Containers:</text>
  <text x="250" y="390" font-size="9" fill="#555">grpc_out | splunk_out | splunkcloud_out | siem_out | reporting_out | http_out | soar_light</text>
  <text x="70" y="410" font-size="10" fill="#E65100" font-weight="bold">Orchestrator:</text>
  <text x="170" y="410" font-size="9" fill="#555">flume (aggregates all input+output configs into unified pipeline config)</text>
  <text x="70" y="435" font-size="9" fill="#888">Template rendering: /template/{container_name}.tmpl → Go templates → base64 rendered config</text>
  <text x="70" y="448" font-size="9" fill="#888">Flume generation: Fetches all src+dst configs for ophid → Merges AppConfig → Publishes to cm-flume</text>

  <!-- Database -->
  <rect x="800" y="150" width="370" height="310" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2" filter="url(#s)"/>
  <text x="985" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">PostgreSQL (cdc-db)</text>

  <rect x="820" y="195" width="330" height="80" rx="5" fill="white" stroke="#E65100" stroke-width="1"/>
  <text x="985" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">cdc_config table</text>
  <text x="830" y="230" font-size="9" fill="#555">id | ophid | container_name | version (auto-inc)</text>
  <text x="830" y="244" font-size="9" fill="#555">config (JSONB) | message | status_code</text>
  <text x="830" y="258" font-size="9" fill="#555">UNIQUE(ophid, version, container_name)</text>
  <text x="830" y="272" font-size="9" fill="#888">Trigger: auto-increment version per ophid/container</text>

  <rect x="820" y="285" width="330" height="60" rx="5" fill="white" stroke="#E65100" stroke-width="1"/>
  <text x="985" y="303" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">etl table</text>
  <text x="830" y="320" font-size="9" fill="#555">id | ophid | container_name | etl_id | etl_data (JSONB)</text>
  <text x="830" y="334" font-size="9" fill="#555">UNIQUE(ophid, container_name, etl_id)</text>

  <rect x="820" y="355" width="330" height="60" rx="5" fill="white" stroke="#E65100" stroke-width="1"/>
  <text x="985" y="373" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">flow_mapping table</text>
  <text x="830" y="390" font-size="9" fill="#555">id | flow_id | ophid | container_name | ha_state</text>
  <text x="830" y="404" font-size="9" fill="#555">Maps flows ↔ containers (active/passive HA)</text>

  <!-- Arrows to DB -->
  <line x1="772" y1="300" x2="818" y2="300" stroke="#E65100" stroke-width="2" marker-end="url(#a)"/>

  <!-- Dapr PubSub Publishing -->
  <rect x="30" y="490" width="1140" height="150" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" filter="url(#s)"/>
  <text x="600" y="515" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Dapr PubSub Publishing → Config Manager Topics</text>

  <rect x="50" y="530" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="115" y="552" text-anchor="middle" font-size="9" fill="#555">cm-dns_in-{env}</text>
  <rect x="190" y="530" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="255" y="552" text-anchor="middle" font-size="9" fill="#555">cm-rpz_in-{env}</text>
  <rect x="330" y="530" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="395" y="552" text-anchor="middle" font-size="9" fill="#555">cm-ipmeta_in</text>
  <rect x="470" y="530" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="535" y="552" text-anchor="middle" font-size="9" fill="#555">cm-grpc_in</text>
  <rect x="610" y="530" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="675" y="552" text-anchor="middle" font-size="9" fill="#555">cm-grpc_out</text>
  <rect x="750" y="530" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="815" y="552" text-anchor="middle" font-size="9" fill="#555">cm-siem_out</text>
  <rect x="890" y="530" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="955" y="552" text-anchor="middle" font-size="9" fill="#555">cm-splunk_out</text>
  <rect x="1030" y="530" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="1095" y="552" text-anchor="middle" font-size="9" fill="#555">cm-http_out</text>

  <rect x="50" y="575" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="115" y="597" text-anchor="middle" font-size="9" fill="#555">cm-splunkcloud</text>
  <rect x="190" y="575" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="255" y="597" text-anchor="middle" font-size="9" fill="#555">cm-reporting_out</text>
  <rect x="330" y="575" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="395" y="597" text-anchor="middle" font-size="9" fill="#555">cm-soar_light</text>
  <rect x="470" y="575" width="130" height="35" rx="4" fill="white" stroke="#2E7D32"/>
  <text x="535" y="597" text-anchor="middle" font-size="9" fill="#555">cm-flume-{env}</text>

  <text x="680" y="630" font-size="9" fill="#888">Message: PubSubConfigObject {ophid, version, app_name} → Config Manager consumes and delivers to on-prem agents</text>

  <!-- Arrows from source -->
  <line x1="150" y1="132" x2="150" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="400" y1="132" x2="400" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Dependencies -->
  <rect x="30" y="660" width="1140" height="170" rx="6" fill="white" stroke="#555" stroke-width="1" filter="url(#s)"/>
  <text x="600" y="685" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Dependencies &amp; External Services</text>
  <text x="50" y="710" font-size="10" fill="#555">• CDC Flow API (atlas.flowapi.address, default 127.0.0.1:9090) — Flow, source, destination, ETL metadata via gRPC</text>
  <text x="50" y="730" font-size="10" fill="#555">• Config Manager — Consumes cm-{container} topics via Kafka/Dapr, delivers configs to on-prem hosts</text>
  <text x="50" y="750" font-size="10" fill="#555">• Dapr Sidecar (localhost:50001) — PubSub publishing, 5s timeout for config notifications</text>
  <text x="50" y="770" font-size="10" fill="#555">• PostgreSQL (database.address:5432, db: cdc-db) — GORM ORM with auto-migration and hotload</text>
  <text x="50" y="790" font-size="10" fill="#555">• Status Service (atlas.statussvc.address, default localhost:19096) — Flow/config status updates</text>
  <text x="50" y="810" font-size="10" fill="#555">• HostApp Service (atlas.hostapp.address, default http://localhost:18080) — Host/appliance management</text>
  <text x="700" y="710" font-size="10" fill="#555">• Vault (optional) — HashiCorp Vault for credential encrypt/decrypt</text>
  <text x="700" y="730" font-size="10" fill="#555">• Prometheus (atlas.prometheus.address) — Metrics collection</text>
  <text x="700" y="750" font-size="10" fill="#555">• gRPC Gateway: protoc-gen-gateway serves both REST (8080) and gRPC (9090)</text>
  <text x="700" y="770" font-size="10" fill="#555">• Framework: Atlas App Toolkit (GORM, validation, request ID)</text>
</svg>