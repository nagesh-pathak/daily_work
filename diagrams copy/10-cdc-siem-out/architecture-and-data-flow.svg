<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#555"/></marker>
    <filter id="s"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="600" fill="#f8f9fa" rx="6"/>
  <rect x="0" y="0" width="1100" height="50" fill="#AD1457"/>
  <text x="550" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">cdc.siem-out — SIEM Forwarding via Splunk UF (CEF/LEEF)</text>

  <rect x="20" y="65" width="1060" height="35" rx="4" fill="#FCE4EC" stroke="#C62828" stroke-width="1"/>
  <text x="550" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">On-Prem Only — File-based via Splunk UF. Like splunk-out but for SIEM (ArcSight CEF / QRadar LEEF).</text>

  <!-- Architecture -->
  <rect x="20" y="115" width="1060" height="200" rx="8" fill="#FDE7F4" stroke="#AD1457" stroke-width="2" filter="url(#s)"/>
  <text x="550" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#AD1457">Architecture &amp; Data Flow</text>

  <rect x="40" y="155" width="180" height="70" rx="6" fill="white" stroke="#E65100"/>
  <text x="130" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Flume Pipeline</text>
  <text x="55" y="198" font-size="9" fill="#555">DnsToCefLeef sink</text>
  <text x="55" y="213" font-size="9" fill="#555">RpzToCefLeef sink</text>

  <line x1="222" y1="190" x2="258" y2="190" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="260" y="155" width="200" height="70" rx="6" fill="white" stroke="#2E7D32"/>
  <text x="360" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">CEF/LEEF Output Dirs</text>
  <text x="275" y="195" font-size="9" fill="#555">/data/out/siem/nios/dns/cef/</text>
  <text x="275" y="210" font-size="9" fill="#555">/data/out/siem/nios/dns/leef/</text>

  <line x1="462" y1="190" x2="498" y2="190" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="500" y="155" width="220" height="70" rx="6" fill="white" stroke="#7CB342"/>
  <text x="610" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="#33691E">Splunk UF</text>
  <text x="515" y="195" font-size="9" fill="#555">Monitors siem dirs (inputs.conf)</text>
  <text x="515" y="210" font-size="9" fill="#555">Splunkforwarderbase v2.1.3</text>

  <line x1="722" y1="190" x2="758" y2="190" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="760" y="155" width="200" height="70" rx="6" fill="white" stroke="#1565C0"/>
  <text x="860" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">Customer SIEM</text>
  <text x="775" y="195" font-size="9" fill="#555">ArcSight (CEF) or</text>
  <text x="775" y="210" font-size="9" fill="#555">QRadar (LEEF)</text>

  <!-- Health -->
  <rect x="40" y="240" width="1020" height="55" rx="5" fill="white" stroke="#C62828"/>
  <text x="550" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">Health Check: HTTP :10001/health — Monitors Splunk UF + data directories (same as splunk-out)</text>
  <text x="60" y="282" font-size="9" fill="#555">TLS mutual auth to Splunk UF port 8089 | Process liveness | Dir writable checks | Reports to cdc.agent &amp; health.reporter</text>

  <!-- Output Formats -->
  <rect x="20" y="335" width="530" height="240" rx="8" fill="white" stroke="#555" stroke-width="1" filter="url(#s)"/>
  <text x="285" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Output Formats</text>

  <rect x="40" y="375" width="490" height="80" rx="5" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="285" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">CEF (Common Event Format) — ArcSight</text>
  <text x="55" y="415" font-size="9" fill="#555">CEF:0|Infoblox|BloxOne|1.0|DNS Query|DNS Response|3|</text>
  <text x="55" y="430" font-size="9" fill="#555">src={client_ip} dst={server_ip} cs1={query_name} cs2={query_type} cs3={response_code}</text>
  <text x="55" y="445" font-size="9" fill="#888">Dirs: /infoblox/data/out/siem/nios/dns/cef/, /infoblox/data/out/siem/nios/rpz/cef/, /infoblox/data/out/siem/bloxone/cef/</text>

  <rect x="40" y="465" width="490" height="80" rx="5" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="285" y="485" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">LEEF (Log Event Extended Format) — QRadar</text>
  <text x="55" y="505" font-size="9" fill="#555">LEEF:2.0|Infoblox|BloxOne|1.0|DNS Query|</text>
  <text x="55" y="520" font-size="9" fill="#555">src={client_ip}	dst={server_ip}	devTime={timestamp}	proto=UDP</text>
  <text x="55" y="535" font-size="9" fill="#888">Dirs: /infoblox/data/out/siem/nios/dns/leef/, /infoblox/data/out/siem/nios/rpz/leef/, /infoblox/data/out/siem/bloxone/leef/</text>

  <!-- Dependencies -->
  <rect x="570" y="335" width="510" height="240" rx="8" fill="white" stroke="#555" stroke-width="1" filter="url(#s)"/>
  <text x="825" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Dependencies &amp; Context</text>
  <text x="590" y="385" font-size="10" fill="#555">• cdc.splunkforwarderbase v2.1.3 (base Docker image)</text>
  <text x="590" y="405" font-size="10" fill="#555">• Splunk UF 9.1.0 for data forwarding</text>
  <text x="590" y="425" font-size="10" fill="#555">• Flume DnsToCefLeef / RpzToCefLeef Java sinks</text>
  <text x="590" y="445" font-size="10" fill="#555">• Config Manager delivers siem-out config</text>
  <text x="590" y="465" font-size="10" fill="#555">• cdc.agent for disk cleanup of sent files</text>
  <text x="590" y="490" font-size="10" font-weight="bold" fill="#333">Differences from splunk-out:</text>
  <text x="590" y="510" font-size="9" fill="#555">• Reads from /data/out/siem/ (not /data/out/splunk/)</text>
  <text x="590" y="526" font-size="9" fill="#555">• Data in CEF/LEEF format (not raw CSV)</text>
  <text x="590" y="542" font-size="9" fill="#555">• Targets ArcSight/QRadar (not Splunk indexers)</text>
  <text x="590" y="558" font-size="9" fill="#555">• Same base image and health check mechanism</text>
</svg>