<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#555"/></marker>
    <filter id="s"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1000" height="620" fill="#f8f9fa" rx="6"/>
  <rect x="0" y="0" width="1000" height="50" fill="#AD1457"/>
  <text x="500" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">cdc.reporting-out — Splunk Universal Forwarder (Reporting)</text>

  <!-- Data Flow -->
  <rect x="20" y="65" width="960" height="190" rx="8" fill="white" stroke="#AD1457" stroke-width="2" filter="url(#s)"/>
  <text x="500" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#AD1457">Data Flow Pipeline</text>

  <rect x="40" y="110" width="140" height="50" rx="5" fill="#F3E5F5" stroke="#AD1457"/>
  <text x="110" y="133" text-anchor="middle" font-size="10" fill="#555">cdc.flume</text>
  <text x="110" y="148" text-anchor="middle" font-size="8" fill="#888">Writes output files</text>
  <line x1="182" y1="135" x2="218" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="220" y="110" width="140" height="50" rx="5" fill="#FCE4EC" stroke="#AD1457"/>
  <text x="290" y="133" text-anchor="middle" font-size="10" fill="#555">/data/out/reporting/</text>
  <text x="290" y="148" text-anchor="middle" font-size="8" fill="#888">CSV/CEF/LEEF files</text>
  <line x1="362" y1="135" x2="398" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="400" y="110" width="180" height="50" rx="5" fill="#FCE4EC" stroke="#AD1457"/>
  <text x="490" y="128" text-anchor="middle" font-size="10" fill="#555">Splunk UF Monitor</text>
  <text x="490" y="148" text-anchor="middle" font-size="8" fill="#888">inputs.conf monitoring</text>
  <line x1="582" y1="135" x2="618" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="620" y="110" width="160" height="50" rx="5" fill="#FCE4EC" stroke="#AD1457"/>
  <text x="700" y="128" text-anchor="middle" font-size="10" fill="#555">Splunk Forwarder</text>
  <text x="700" y="148" text-anchor="middle" font-size="8" fill="#888">TCP 9997 encrypted</text>
  <line x1="782" y1="135" x2="818" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="820" y="110" width="140" height="50" rx="5" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="890" y="128" text-anchor="middle" font-size="10" fill="#555">Splunk Indexer</text>
  <text x="890" y="148" text-anchor="middle" font-size="8" fill="#888">Customer Splunk</text>

  <text x="40" y="190" font-size="10" font-weight="bold" fill="#333">Monitored Directories:</text>
  <text x="40" y="210" font-size="9" fill="#555">/data/out/reporting/dns/ → DNS query/response logs</text>
  <text x="350" y="210" font-size="9" fill="#555">/data/out/reporting/rpz/ → RPZ threat feed hit logs</text>
  <text x="650" y="210" font-size="9" fill="#555">/data/out/reporting/dhcp/ → DHCP lease logs</text>
  <text x="40" y="235" font-size="9" fill="#888">Output formats: CSV (default), CEF (ArcSight), LEEF (QRadar), JSON — configured per flow</text>

  <!-- Architecture -->
  <rect x="20" y="275" width="470" height="190" rx="8" fill="white" stroke="#AD1457" stroke-width="1" filter="url(#s)"/>
  <text x="255" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Splunk UF Configuration</text>
  <text x="40" y="325" font-size="9" fill="#555">• inputs.conf: monitor:///data/out/reporting/* (recursive)</text>
  <text x="40" y="343" font-size="9" fill="#555">• outputs.conf: tcpout server=&lt;indexer&gt;:9997 (TLS)</text>
  <text x="40" y="361" font-size="9" fill="#555">• server.conf: SSL cert/key settings</text>
  <text x="40" y="379" font-size="9" fill="#555">• props.conf: sourcetype = cdc_reporting_*</text>
  <text x="40" y="397" font-size="9" fill="#555">• transforms.conf: field extractions per data type</text>
  <text x="40" y="420" font-size="9" fill="#888">• SSL certs generated by config_writer (self-signed)</text>
  <text x="40" y="438" font-size="9" fill="#888">• Splunk registration via REST API port 8089</text>
  <text x="40" y="456" font-size="9" fill="#888">• Identical to cdc.splunk-out but for Reporting destination</text>

  <!-- Health & Monitoring -->
  <rect x="510" y="275" width="470" height="190" rx="8" fill="white" stroke="#AD1457" stroke-width="1" filter="url(#s)"/>
  <text x="745" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Health &amp; Monitoring</text>
  <text x="530" y="325" font-size="9" fill="#555">• Health check: HTTP :10001/health</text>
  <text x="530" y="343" font-size="9" fill="#555">• Splunk mgmt API: HTTPS :8089 (monitor status)</text>
  <text x="530" y="361" font-size="9" fill="#555">• supervisord: manages splunkd + health processes</text>
  <text x="530" y="379" font-size="9" fill="#555">• cdc.common/health: port monitoring + process checks</text>
  <text x="530" y="397" font-size="9" fill="#555">• monitor_hostapp_config.sh: watches config changes</text>
  <text x="530" y="420" font-size="9" fill="#888">Base image: cdc.splunkforwarderbase (Splunk UF 9.1.0)</text>
  <text x="530" y="438" font-size="9" fill="#888">Container runtime: supervisord managing 3 processes</text>
  <text x="530" y="456" font-size="9" fill="#888">(splunkd, health_checker, config_monitor)</text>

  <!-- Dependencies -->
  <rect x="20" y="485" width="960" height="115" rx="8" fill="white" stroke="#555" stroke-width="1" filter="url(#s)"/>
  <text x="500" y="510" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Dependencies &amp; Sibling Components</text>
  <text x="40" y="535" font-size="9" fill="#555">• cdc.splunkforwarderbase — Base Docker image with Splunk UF 9.1.0 + Alpine + glibc</text>
  <text x="40" y="553" font-size="9" fill="#555">• cdc.common — health monitoring, crypt (AES-256), logger, cleanup utilities</text>
  <text x="40" y="571" font-size="9" fill="#555">• cdc.flume — Upstream: writes formatted files to /data/out/reporting/</text>
  <text x="500" y="535" font-size="9" fill="#555">• cdc.appbase — Alpine base + supervisord + /infoblox/data/ structure</text>
  <text x="500" y="553" font-size="9" fill="#555">• Config Manager — Delivers reporting-out config via cm-reporting_out topic</text>
  <text x="500" y="571" font-size="9" fill="#555">• Siblings: cdc.splunk-out (Splunk dest), cdc.siem-out (SIEM dest)</text>
  <text x="40" y="590" font-size="9" fill="#888">Source: cmd/ (main), pkg/ (health, config), docker/ (Dockerfile), deploy/ (Helm)</text>
</svg>