<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#555"/></marker>
    <filter id="s"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="600" fill="#f8f9fa" rx="6"/>
  <rect x="0" y="0" width="1100" height="50" fill="#C62828"/>
  <text x="550" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">cdc.rpz-in — RPZ Syslog Ingestion via Stunnel TLS</text>

  <rect x="20" y="65" width="1060" height="35" rx="4" fill="#FCE4EC" stroke="#C62828" stroke-width="1"/>
  <text x="550" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">On-Prem Only — Receives RPZ hit events from NIOS via syslog over TLS (stunnel). Stages events for Flume processing.</text>

  <!-- Pipeline -->
  <rect x="20" y="115" width="1060" height="200" rx="8" fill="#FCE4EC" stroke="#C62828" stroke-width="2" filter="url(#s)"/>
  <text x="550" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">Data Flow Pipeline</text>

  <rect x="40" y="155" width="160" height="70" rx="6" fill="white" stroke="#E65100"/>
  <text x="120" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">NIOS Appliance</text>
  <text x="55" y="198" font-size="9" fill="#555">RPZ hit syslog events</text>
  <text x="55" y="213" font-size="9" fill="#555">TLS syslog (port 6514)</text>
  <line x1="202" y1="190" x2="228" y2="190" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="230" y="155" width="170" height="70" rx="6" fill="white" stroke="#6A1B9A"/>
  <text x="315" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">Stunnel TLS</text>
  <text x="245" y="198" font-size="9" fill="#555">Port 6514 (TLS) →</text>
  <text x="245" y="213" font-size="9" fill="#555">Port 50514 (plaintext)</text>
  <line x1="402" y1="190" x2="428" y2="190" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="430" y="155" width="170" height="70" rx="6" fill="white" stroke="#1565C0"/>
  <text x="515" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">rsyslog</text>
  <text x="445" y="198" font-size="9" fill="#555">Receives on port 50514</text>
  <text x="445" y="213" font-size="9" fill="#555">Parses syslog messages</text>
  <line x1="602" y1="190" x2="628" y2="190" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="630" y="155" width="200" height="70" rx="6" fill="white" stroke="#2E7D32"/>
  <text x="730" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Syslog Interceptor</text>
  <text x="645" y="198" font-size="9" fill="#555">SyslogInterceptorBuilder</text>
  <text x="645" y="213" font-size="9" fill="#555">Parses RPZ-specific fields</text>
  <line x1="832" y1="190" x2="858" y2="190" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="860" y="155" width="200" height="70" rx="6" fill="white" stroke="#33691E"/>
  <text x="960" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#33691E">Flume Staging</text>
  <text x="875" y="198" font-size="9" fill="#555">/data/in/flume/rpz/</text>
  <text x="875" y="213" font-size="9" fill="#555">For Flume multiport source</text>

  <!-- Processing details -->
  <rect x="40" y="240" width="1020" height="55" rx="5" fill="white" stroke="#C62828"/>
  <text x="550" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">TLS Termination: stunnel 6514→50514 | rsyslog parses RFC3164/5424 | Interceptor extracts: qname, rpz_zone, rpz_action, client_ip, member</text>

  <!-- Left details -->
  <rect x="20" y="315" width="530" height="260" rx="8" fill="white" stroke="#555" stroke-width="1" filter="url(#s)"/>
  <text x="285" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Stunnel &amp; TLS Configuration</text>
  <text x="40" y="365" font-size="10" fill="#555">• Stunnel listens on port 6514 (TLS-encrypted syslog)</text>
  <text x="40" y="385" font-size="10" fill="#555">• Terminates TLS, forwards to localhost:50514 (plaintext)</text>
  <text x="40" y="405" font-size="10" fill="#555">• Certificate: /infoblox/etc/certs/syslog-cert.pem</text>
  <text x="40" y="425" font-size="10" fill="#555">• Key: /infoblox/etc/certs/syslog-key.pem</text>
  <text x="40" y="445" font-size="10" fill="#555">• CA: /infoblox/etc/certs/ca.pem</text>
  <text x="40" y="470" font-size="10" font-weight="bold" fill="#333">RPZ Event Fields:</text>
  <text x="40" y="490" font-size="9" fill="#555">• qname — query name that triggered RPZ hit</text>
  <text x="40" y="506" font-size="9" fill="#555">• rpz_zone — RPZ zone that matched</text>
  <text x="40" y="522" font-size="9" fill="#555">• rpz_action — action (NXDOMAIN, PASSTHRU, etc.)</text>
  <text x="40" y="538" font-size="9" fill="#555">• client_ip — client that made the query</text>
  <text x="40" y="554" font-size="9" fill="#555">• member — NIOS member that processed</text>

  <!-- Right details -->
  <rect x="570" y="315" width="510" height="260" rx="8" fill="white" stroke="#555" stroke-width="1" filter="url(#s)"/>
  <text x="825" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Dependencies &amp; Architecture</text>
  <text x="590" y="370" font-size="10" fill="#555">• NIOS syslog agent (sends RPZ events via TLS)</text>
  <text x="590" y="390" font-size="10" fill="#555">• stunnel (TLS termination proxy)</text>
  <text x="590" y="410" font-size="10" fill="#555">• rsyslog (syslog message parsing)</text>
  <text x="590" y="430" font-size="10" fill="#555">• Flume multiport_syslogtcp source (port 514)</text>
  <text x="590" y="450" font-size="10" fill="#555">• cdc.agent (disk cleanup)</text>
  <text x="590" y="470" font-size="10" fill="#555">• Config Manager (delivers rpz-in config)</text>
  <text x="590" y="500" font-size="10" font-weight="bold" fill="#333">Docker Image:</text>
  <text x="590" y="520" font-size="9" fill="#555">Alpine Linux + stunnel + rsyslog</text>
  <text x="590" y="536" font-size="9" fill="#555">supervisord manages: stunnel, rsyslog, interceptor</text>
  <text x="590" y="556" font-size="10" font-weight="bold" fill="#333">Flume Connection:</text>
  <text x="590" y="572" font-size="9" fill="#555">multiport_syslogtcp on port 514 for parsed events</text>
</svg>