<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1e6ad6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f8a4c"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <style>
      .title  { font-size: 22px; font-weight: 700; }
      .lane   { font-size: 14px; font-weight: 700; fill: #555; }
      .box    { fill: #fff; stroke: #333; stroke-width: 1.5; rx: 8; ry: 8; }
      .api    { fill: #eaf3ff; stroke: #1e6ad6; }
      .db     { fill: #fff7e0; stroke: #b8860b; }
      .mgr    { fill: #f3e8ff; stroke: #6b3fa0; }
      .agent  { fill: #e6fbe6; stroke: #1f8a4c; }
      .cont   { fill: #fde8e8; stroke: #b3261e; }
      .ext    { fill: #f0f0f0; stroke: #777; }
      .lbl    { fill: #222; }
      .lblsm  { fill: #333; font-size: 11px; }
      .pathlbl{ fill: #333; font-size: 12px; font-weight: 600; }
      .arrow  { fill: none; stroke: #333; stroke-width: 1.6; }
      .arrowB { fill: none; stroke: #1e6ad6; stroke-width: 1.6; }
      .arrowG { fill: none; stroke: #1f8a4c; stroke-width: 1.6; }
      .arrowO { fill: none; stroke: #d97706; stroke-width: 1.6; stroke-dasharray: 6 4; }
      .swim   { fill: #f8f8f8; stroke: #ccc; }
    </style>
  </defs>

  <text x="700" y="34" text-anchor="middle" class="title">CDC Config Push — Onprem Flow</text>
  <text x="700" y="58" text-anchor="middle" class="lblsm">cdc.api → atlas.config.manager → atlas.onprem.config.service → cdc.* containers (with status callback)</text>

  <!-- Swimlanes -->
  <rect x="20"  y="80" width="1360" height="380" class="swim"/>
  <rect x="20"  y="470" width="1360" height="410" class="swim"/>
  <text x="40" y="105" class="lane">CLOUD</text>
  <text x="40" y="495" class="lane">ONPREM APPLIANCE  (ophid = X)</text>

  <!-- Cloud components -->
  <rect x="60"  y="140" width="200" height="80"  class="box api"/>
  <text x="160" y="170" text-anchor="middle" class="lbl" font-weight="700">User / UI / API</text>
  <text x="160" y="190" text-anchor="middle" class="lblsm">POST /cdc/v1/config/{name}</text>
  <text x="160" y="206" text-anchor="middle" class="lblsm">body: {ophid, config}</text>

  <rect x="320" y="140" width="240" height="120" class="box api"/>
  <text x="440" y="168" text-anchor="middle" class="lbl" font-weight="700">cdc.api</text>
  <text x="440" y="188" text-anchor="middle" class="lblsm">CreateConfig (zserver.go ~L42)</text>
  <text x="440" y="204" text-anchor="middle" class="lblsm">• validate container name</text>
  <text x="440" y="220" text-anchor="middle" class="lblsm">• dup check (latest version)</text>
  <text x="440" y="236" text-anchor="middle" class="lblsm">• INSERT cdc_config</text>
  <text x="440" y="252" text-anchor="middle" class="lblsm">• PubSub publish</text>

  <rect x="620" y="160" width="200" height="80"  class="box db"/>
  <text x="720" y="188" text-anchor="middle" class="lbl" font-weight="700">Postgres cdc_config</text>
  <text x="720" y="206" text-anchor="middle" class="lblsm">trigger set_version()</text>
  <text x="720" y="222" text-anchor="middle" class="lblsm">defaults: msg=Configuration Ready</text>
  <text x="720" y="236" text-anchor="middle" class="lblsm">status_code=99</text>

  <rect x="320" y="320" width="240" height="100" class="box ext"/>
  <text x="440" y="348" text-anchor="middle" class="lbl" font-weight="700">PubSub / Kafka</text>
  <text x="440" y="368" text-anchor="middle" class="lblsm">topic: atlas.pubsub.publish.&lt;name&gt;</text>
  <text x="440" y="384" text-anchor="middle" class="lblsm">PubSubConfigObject</text>
  <text x="440" y="400" text-anchor="middle" class="lblsm">{ophid, version, app_name}</text>

  <rect x="880" y="140" width="280" height="220" class="box mgr"/>
  <text x="1020" y="168" text-anchor="middle" class="lbl" font-weight="700">atlas.config.manager  (cloud)</text>
  <text x="1020" y="190" text-anchor="middle" class="lblsm">• kafkaconsumer.go / pubsub.go</text>
  <text x="1020" y="208" text-anchor="middle" class="lblsm">• onpremNotificationCh[ophid]</text>
  <text x="1020" y="226" text-anchor="middle" class="lblsm">  (sync.Map, buffer=1)</text>
  <text x="1020" y="246" text-anchor="middle" class="lblsm">• Subscribe RPC (server stream)</text>
  <text x="1020" y="264" text-anchor="middle" class="lblsm">• keepalive ~30s</text>
  <text x="1020" y="284" text-anchor="middle" class="lblsm">• UPS check (maint. windows)</text>
  <text x="1020" y="302" text-anchor="middle" class="lblsm">• S3 cache for fragmented payload</text>
  <text x="1020" y="324" text-anchor="middle" class="lblsm">• proxies SendStatus → cdc.api</text>

  <rect x="1200" y="160" width="160" height="80" class="box ext"/>
  <text x="1280" y="188" text-anchor="middle" class="lbl" font-weight="700">UPS</text>
  <text x="1280" y="206" text-anchor="middle" class="lblsm">maintenance window</text>
  <text x="1280" y="222" text-anchor="middle" class="lblsm">policy service</text>

  <rect x="1200" y="280" width="160" height="80" class="box ext"/>
  <text x="1280" y="308" text-anchor="middle" class="lbl" font-weight="700">S3</text>
  <text x="1280" y="326" text-anchor="middle" class="lblsm">config payload cache</text>
  <text x="1280" y="342" text-anchor="middle" class="lblsm">(fragments + SHA-1)</text>

  <!-- Cloud arrows -->
  <path class="arrow" d="M260 180 H 320" marker-end="url(#arrow)"/>
  <text x="290" y="172" text-anchor="middle" class="lblsm">1</text>

  <path class="arrow" d="M560 195 H 620" marker-end="url(#arrow)"/>
  <text x="590" y="187" text-anchor="middle" class="lblsm">2  INSERT</text>

  <path class="arrow" d="M440 260 V 320" marker-end="url(#arrow)"/>
  <text x="455" y="295" class="lblsm">3  publish</text>

  <path class="arrow" d="M560 370 H 880 L 880 250" marker-end="url(#arrow)"/>
  <text x="700" y="362" text-anchor="middle" class="lblsm">4  notification {ophid, version}</text>

  <path class="arrow" d="M1160 200 H 1200" marker-end="url(#arrow)"/>
  <text x="1180" y="192" text-anchor="middle" class="lblsm">UPS</text>

  <path class="arrow" d="M1160 320 H 1200" marker-end="url(#arrow)"/>
  <text x="1180" y="312" text-anchor="middle" class="lblsm">S3</text>

  <!-- Lane crossing - the core gRPC stream -->
  <path class="arrowB" d="M1020 360 V 530" marker-end="url(#arrowBlue)"/>
  <text x="1030" y="395" class="pathlbl" fill="#1e6ad6">5  gRPC Subscribe stream  (TLS, WAN)</text>
  <text x="1030" y="412" class="lblsm" fill="#1e6ad6">    SubscribeResponse{notification}</text>
  <text x="1030" y="427" class="lblsm" fill="#1e6ad6">    keepalive heartbeats</text>

  <!-- Onprem components -->
  <rect x="880" y="540" width="280" height="200" class="box agent"/>
  <text x="1020" y="568" text-anchor="middle" class="lbl" font-weight="700">atlas.onprem.config.service</text>
  <text x="1020" y="588" text-anchor="middle" class="lblsm">configservice.go::Subscribe (client)</text>
  <text x="1020" y="606" text-anchor="middle" class="lblsm">configclient.go::Listen + Apply</text>
  <text x="1020" y="624" text-anchor="middle" class="lblsm">• FetchConfig (4 MB SHA-1 fragments)</text>
  <text x="1020" y="642" text-anchor="middle" class="lblsm">• version compare (semver)</text>
  <text x="1020" y="660" text-anchor="middle" class="lblsm">• ApplyConfig (script | restart)</text>
  <text x="1020" y="678" text-anchor="middle" class="lblsm">• SendStatus → manager → cdc.api</text>
  <text x="1020" y="696" text-anchor="middle" class="lblsm">• Reconcile every 15 min</text>
  <text x="1020" y="714" text-anchor="middle" class="lblsm">• reconnect on 4 missed keepalives</text>

  <rect x="540" y="560" width="280" height="80" class="box ext"/>
  <text x="680" y="588" text-anchor="middle" class="lbl" font-weight="700">Local state on disk</text>
  <text x="680" y="608" text-anchor="middle" class="lblsm">/opt/&lt;name&gt;/conf/&lt;name&gt;.json   (config)</text>
  <text x="680" y="624" text-anchor="middle" class="lblsm">/infoblox/cdc/&lt;name&gt;/.version  (dedup ground truth)</text>

  <rect x="540" y="680" width="280" height="160" class="box cont"/>
  <text x="680" y="708" text-anchor="middle" class="lbl" font-weight="700">CDC containers (Docker / K8s)</text>
  <text x="680" y="730" text-anchor="middle" class="lblsm">cdc.flume     cdc.grpc-in</text>
  <text x="680" y="746" text-anchor="middle" class="lblsm">cdc.http-out  cdc.siem-out</text>
  <text x="680" y="762" text-anchor="middle" class="lblsm">cdc.splunk-out  cdc.dns-in / rpz-in</text>
  <text x="680" y="784" text-anchor="middle" class="lblsm">reload via script (no restart)</text>
  <text x="680" y="800" text-anchor="middle" class="lblsm">or container restart</text>

  <rect x="60" y="560" width="220" height="100" class="box agent"/>
  <text x="170" y="588" text-anchor="middle" class="lbl" font-weight="700">atlas.onprem.health.reporter</text>
  <text x="170" y="608" text-anchor="middle" class="lblsm">independent heartbeats</text>
  <text x="170" y="624" text-anchor="middle" class="lblsm">container state → cloud</text>
  <text x="170" y="644" text-anchor="middle" class="lblsm">Health Collector</text>

  <rect x="60" y="700" width="220" height="100" class="box agent"/>
  <text x="170" y="728" text-anchor="middle" class="lbl" font-weight="700">cdc.agent</text>
  <text x="170" y="748" text-anchor="middle" class="lblsm">disk monitor / cleanup</text>
  <text x="170" y="764" text-anchor="middle" class="lblsm">health probe :10001</text>
  <text x="170" y="782" text-anchor="middle" class="lblsm">NOT in config push path</text>

  <!-- Onprem arrows -->
  <path class="arrow" d="M880 620 H 820" marker-end="url(#arrow)"/>
  <text x="850" y="612" text-anchor="middle" class="lblsm">7  read .version</text>

  <path class="arrow" d="M880 660 H 820 L 820 720" marker-end="url(#arrow)"/>
  <text x="850" y="700" text-anchor="middle" class="lblsm">8  write config + reload</text>

  <!-- Status callback (return path) -->
  <path class="arrowG" d="M1160 600 H 1230 L 1230 380 L 1160 380" marker-end="url(#arrowGreen)"/>
  <text x="1240" y="500" class="pathlbl" fill="#1f8a4c">9  SendStatus</text>
  <text x="1240" y="516" class="lblsm" fill="#1f8a4c">via manager</text>
  <text x="1240" y="532" class="lblsm" fill="#1f8a4c">→ cdc.api.UpdateConfigStatus</text>
  <text x="1240" y="548" class="lblsm" fill="#1f8a4c">→ UPDATE message,</text>
  <text x="1240" y="564" class="lblsm" fill="#1f8a4c">    status_code</text>

  <!-- Reconcile loop -->
  <path class="arrowO" d="M1020 740 V 860 H 1340 V 200 H 1160" marker-end="url(#arrowOrange)"/>
  <text x="1180" y="855" text-anchor="end" class="lblsm" fill="#d97706">Reconcile every 15 min — recovers any missed notifications</text>

  <!-- Legend -->
  <rect x="60" y="820" width="420" height="60" class="box ext"/>
  <text x="70" y="840" class="lblsm" font-weight="700">Legend</text>
  <line x1="70" y1="852" x2="110" y2="852" class="arrowB"/>
  <text x="118" y="855" class="lblsm">push (cloud → onprem)</text>
  <line x1="260" y1="852" x2="300" y2="852" class="arrowG"/>
  <text x="308" y="855" class="lblsm">status callback</text>
  <line x1="70" y1="870" x2="110" y2="870" class="arrowO"/>
  <text x="118" y="873" class="lblsm">15-min reconcile (catch-up)</text>
  <line x1="260" y1="870" x2="300" y2="870" class="arrow"/>
  <text x="308" y="873" class="lblsm">control / data plane</text>
</svg>
