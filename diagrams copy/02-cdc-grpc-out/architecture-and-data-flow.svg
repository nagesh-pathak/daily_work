<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#555"/></marker>
    <filter id="s"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="700" fill="#f8f9fa" rx="6"/>
  <rect x="0" y="0" width="1100" height="50" fill="#1565C0"/>
  <text x="550" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">cdc.grpc-out — On-Prem File Upload to Cloud via gRPC</text>

  <!-- Source directories -->
  <rect x="30" y="70" width="220" height="180" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" filter="url(#s)"/>
  <text x="140" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Monitored Directories</text>
  <rect x="45" y="105" width="190" height="30" rx="4" fill="white" stroke="#1565C0"/>
  <text x="140" y="124" text-anchor="middle" font-size="10" fill="#555">/infoblox/data/out/cloud/dns/</text>
  <rect x="45" y="142" width="190" height="30" rx="4" fill="white" stroke="#1565C0"/>
  <text x="140" y="161" text-anchor="middle" font-size="10" fill="#555">/infoblox/data/out/cloud/ipmeta/</text>
  <rect x="45" y="179" width="190" height="30" rx="4" fill="white" stroke="#1565C0"/>
  <text x="140" y="198" text-anchor="middle" font-size="10" fill="#555">/infoblox/data/out/cloud/rpz/</text>
  <text x="140" y="237" text-anchor="middle" font-size="9" fill="#888">Events: InCloseWrite, InMovedTo</text>

  <!-- Monitor -->
  <rect x="290" y="70" width="200" height="100" rx="6" fill="white" stroke="#E65100" stroke-width="1.5" filter="url(#s)"/>
  <text x="390" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">File Monitor</text>
  <text x="390" y="110" text-anchor="middle" font-size="9" fill="#555">rjeczalik/notify library</text>
  <text x="390" y="126" text-anchor="middle" font-size="9" fill="#555">Validates: .parquet extension</text>
  <text x="390" y="142" text-anchor="middle" font-size="9" fill="#555">IPMeta regex pattern match</text>
  <text x="390" y="158" text-anchor="middle" font-size="9" fill="#555">Skips empty files (deletes)</text>
  <line x1="252" y1="150" x2="288" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Dispatcher -->
  <rect x="290" y="190" width="200" height="80" rx="6" fill="white" stroke="#E65100" stroke-width="1.5"/>
  <text x="390" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Worker Dispatcher</text>
  <text x="390" y="230" text-anchor="middle" font-size="9" fill="#555">Pool: min 3 workers (configurable)</text>
  <text x="390" y="246" text-anchor="middle" font-size="9" fill="#555">Concurrent map prevents duplicates</text>
  <text x="390" y="262" text-anchor="middle" font-size="9" fill="#555">Buffered channel (256)</text>
  <line x1="390" y1="172" x2="390" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Chunking -->
  <rect x="530" y="70" width="220" height="100" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" filter="url(#s)"/>
  <text x="640" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">File Chunking</text>
  <text x="640" y="110" text-anchor="middle" font-size="9" fill="#555">Read entire file into memory</text>
  <text x="640" y="126" text-anchor="middle" font-size="9" fill="#555">Split into 3,774,873 byte chunks</text>
  <text x="640" y="142" text-anchor="middle" font-size="9" fill="#555">(~3.6 MB per UploadRequest)</text>
  <text x="640" y="158" text-anchor="middle" font-size="9" fill="#555">Protobuf: {destination, type, data}</text>
  <line x1="492" y1="120" x2="528" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- gRPC Client -->
  <rect x="530" y="190" width="220" height="100" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#s)"/>
  <text x="640" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">gRPC Client</text>
  <text x="640" y="230" text-anchor="middle" font-size="9" fill="#555">Bidirectional stream to ti-proxy-grpc</text>
  <text x="640" y="246" text-anchor="middle" font-size="9" fill="#555">Context timeout: 2 minutes</text>
  <text x="640" y="262" text-anchor="middle" font-size="9" fill="#555">TLS encryption (optional)</text>
  <text x="640" y="278" text-anchor="middle" font-size="9" fill="#555">Keep-alive: 30s interval</text>
  <line x1="640" y1="172" x2="640" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ti-proxy-grpc -->
  <rect x="790" y="130" width="200" height="80" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" filter="url(#s)"/>
  <text x="890" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">ti-proxy-grpc</text>
  <text x="890" y="170" text-anchor="middle" font-size="9" fill="#555">Receives chunked uploads</text>
  <text x="890" y="186" text-anchor="middle" font-size="9" fill="#555">Forwards to Kafka</text>
  <text x="890" y="200" text-anchor="middle" font-size="9" fill="#555">Port: 9090 (configurable)</text>
  <line x1="752" y1="240" x2="788" y2="180" stroke="#2E7D32" stroke-width="2" marker-end="url(#a)"/>

  <!-- Kafka -->
  <rect x="790" y="230" width="200" height="50" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="890" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Kafka Topics</text>
  <text x="890" y="270" text-anchor="middle" font-size="9" fill="#555">dns, rpz, ipmeta topics (cloud)</text>
  <line x1="890" y1="212" x2="890" y2="228" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- IPMeta handling -->
  <rect x="30" y="300" width="470" height="120" rx="6" fill="white" stroke="#7B1FA2" stroke-width="1.5" filter="url(#s)"/>
  <text x="265" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#7B1FA2">IPMeta Special Handling</text>
  <text x="50" y="342" font-size="9" fill="#555">Filename pattern: ipmeta-{timestamp}-{update_id}.parquet</text>
  <text x="50" y="358" font-size="9" fill="#555">Headers: X-DC-SyncType (Snapshot if update_id=0, else Update)</text>
  <text x="50" y="374" font-size="9" fill="#555">Headers: X-DC-SnapshotTS, X-DC-SnapshotID, X-DC-UpdateID</text>
  <text x="50" y="390" font-size="9" fill="#555">Incremental updates (update_id>0): writes .snapshot_requested trigger file</text>
  <text x="50" y="406" font-size="9" fill="#555">Supports both full snapshots and delta/incremental updates</text>

  <!-- Error handling -->
  <rect x="530" y="300" width="460" height="120" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" filter="url(#s)"/>
  <text x="760" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">Error Handling &amp; Retry</text>
  <text x="550" y="342" font-size="9" fill="#555">Success → File deleted from source directory</text>
  <text x="550" y="358" font-size="9" fill="#555">Failure → File moved to {input_folder}/transfer/ for retry</text>
  <text x="550" y="374" font-size="9" fill="#555">Periodic retry: Every 1 minute (configurable), reprocesses pending files</text>
  <text x="550" y="390" font-size="9" fill="#555">Health check: HTTP GET 127.0.0.1:10001/health</text>
  <text x="550" y="406" font-size="9" fill="#555">Supervisord manages: server (main) + datamonitor (metrics)</text>

  <!-- Config -->
  <rect x="30" y="440" width="1040" height="100" rx="6" fill="white" stroke="#555" stroke-width="1" filter="url(#s)"/>
  <text x="550" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Configuration (/opt/grpc_out/conf/grpc_out.json)</text>
  <text x="50" y="485" font-size="9" fill="#555">{"log_types": {"dns": {"allowed_extension": [".parquet"], "input_folder": "dns", "destination": "kafka"}, "ipmeta": {...}, "rpz": {...}}, "ssl_verify": false}</text>
  <text x="50" y="505" font-size="9" fill="#555">CLI: --ti-proxy-grpc.host (0.0.0.0) | --ti-proxy-grpc.port (9090) | --goroutines.worker.min (3) | --context.cancel.timeout (2m) | --parser.refresh.interval (1m)</text>
  <text x="50" y="525" font-size="9" fill="#555">Env: NS_OPH_ID (org host ID) | SERVICE_ID | Docker entry: scripts/init.sh → supervisord</text>

  <!-- Proto -->
  <rect x="30" y="560" width="1040" height="120" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1" filter="url(#s)"/>
  <text x="550" y="582" text-anchor="middle" font-size="12" font-weight="bold" fill="#7B1FA2">gRPC Protocol (ti-proxy-grpc/service.proto)</text>
  <text x="50" y="605" font-size="10" fill="#555">service TiProxyGrpc { rpc Upload(stream UploadRequest) returns (google.protobuf.Empty); rpc Check(HealthCheckRequest) returns (HealthCheckResponse); }</text>
  <text x="50" y="625" font-size="10" fill="#555">message UploadRequest { string destination = 1; string type = 2; bytes data = 3; }</text>
  <text x="50" y="645" font-size="10" fill="#555">message HealthCheckResponse { enum ServingStatus { UNKNOWN=0; SERVING=1; NOT_SERVING=2; } ServingStatus status = 1; }</text>
  <text x="50" y="668" font-size="9" fill="#888">Dependencies: cdc.common (logging, metrics), atlas.metrics.common, atlas.tls.auth (certificates)</text>
</svg>