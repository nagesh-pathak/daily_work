<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#555"/></marker>
    <filter id="s"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1200" height="800" fill="#f8f9fa" rx="6"/>
  <rect x="0" y="0" width="1200" height="50" fill="#FF6F00"/>
  <text x="600" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">soar-light — SOAR Integration Platform (Security Orchestration &amp; Response)</text>

  <!-- Cloud Mode -->
  <rect x="20" y="65" width="570" height="280" rx="8" fill="#FFF8E1" stroke="#FF6F00" stroke-width="2" filter="url(#s)"/>
  <text x="305" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#FF6F00">Cloud Mode (Kubernetes)</text>

  <rect x="40" y="105" width="120" height="40" rx="5" fill="white" stroke="#FF6F00"/>
  <text x="100" y="130" text-anchor="middle" font-size="10" fill="#555">Dapr PubSub</text>
  <line x1="162" y1="125" x2="178" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="180" y="105" width="120" height="40" rx="5" fill="white" stroke="#FF6F00"/>
  <text x="240" y="130" text-anchor="middle" font-size="10" fill="#555">Kafka Consumer</text>
  <line x1="302" y1="125" x2="318" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="320" y="105" width="130" height="40" rx="5" fill="white" stroke="#FF6F00"/>
  <text x="385" y="130" text-anchor="middle" font-size="10" fill="#555">Event Router</text>
  <line x1="452" y1="125" x2="468" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="470" y="105" width="110" height="40" rx="5" fill="white" stroke="#FF6F00"/>
  <text x="525" y="130" text-anchor="middle" font-size="10" fill="#555">Python Scripts</text>

  <!-- Script Integrations -->
  <rect x="40" y="160" width="530" height="170" rx="5" fill="white" stroke="#FF6F00"/>
  <text x="305" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#FF6F00">20+ Script Integrations (IEventHandler / IScheduler)</text>
  <text x="55" y="200" font-size="9" fill="#555">Slack (webhook, channel notify)</text>
  <text x="250" y="200" font-size="9" fill="#555">Microsoft Teams (adaptive cards)</text>
  <text x="460" y="200" font-size="9" fill="#555">ServiceNow (incidents)</text>
  <text x="55" y="218" font-size="9" fill="#555">Qualys (vulnerability scan)</text>
  <text x="250" y="218" font-size="9" fill="#555">CrowdStrike (IOC submit)</text>
  <text x="460" y="218" font-size="9" fill="#555">PagerDuty (alerts)</text>
  <text x="55" y="236" font-size="9" fill="#555">Jira (ticket creation)</text>
  <text x="250" y="236" font-size="9" fill="#555">Phantom/XSOAR (playbooks)</text>
  <text x="460" y="236" font-size="9" fill="#555">TheHive (case mgmt)</text>
  <text x="55" y="254" font-size="9" fill="#555">VirusTotal (IOC lookup)</text>
  <text x="250" y="254" font-size="9" fill="#555">Carbon Black (endpoint)</text>
  <text x="460" y="254" font-size="9" fill="#555">MISP (threat intel)</text>
  <text x="55" y="275" font-size="9" fill="#888">IEventHandler: triggered per event from Kafka/gRPC</text>
  <text x="55" y="290" font-size="9" fill="#888">IScheduler: periodic polling/enrichment tasks</text>
  <text x="55" y="305" font-size="9" fill="#888">Per-flow isolated Python venvs for dependency isolation</text>
  <text x="55" y="320" font-size="9" fill="#888">Script configs: connection params, API keys, templates</text>

  <!-- On-Prem Mode -->
  <rect x="610" y="65" width="570" height="280" rx="8" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2" filter="url(#s)"/>
  <text x="895" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">On-Prem Mode (File-Based)</text>

  <rect x="630" y="105" width="120" height="40" rx="5" fill="white" stroke="#6A1B9A"/>
  <text x="690" y="130" text-anchor="middle" font-size="10" fill="#555">Config File</text>
  <line x1="752" y1="125" x2="768" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="770" y="105" width="150" height="40" rx="5" fill="white" stroke="#6A1B9A"/>
  <text x="845" y="130" text-anchor="middle" font-size="10" fill="#555">gRPC from grpc-in</text>
  <line x1="922" y1="125" x2="938" y2="125" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="940" y="105" width="130" height="40" rx="5" fill="white" stroke="#6A1B9A"/>
  <text x="1005" y="130" text-anchor="middle" font-size="10" fill="#555">Python Scripts</text>

  <rect x="630" y="160" width="530" height="170" rx="5" fill="white" stroke="#6A1B9A"/>
  <text x="895" y="180" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">On-Prem Data Flow</text>
  <text x="645" y="200" font-size="9" fill="#555">Data arrives from cdc.grpc-in (Parquet → CSV → events)</text>
  <text x="645" y="218" font-size="9" fill="#555">SOAR config from Config Manager (cm-soar_light topic)</text>
  <text x="645" y="236" font-size="9" fill="#555">Script execution in isolated Python venvs</text>
  <text x="645" y="254" font-size="9" fill="#555">Results sent to external SOAR platforms via HTTP/API</text>
  <text x="645" y="275" font-size="9" fill="#888">Data types: SOC_INSIGHTS, SOC_INSIGHTS_V2</text>
  <text x="645" y="290" font-size="9" fill="#888">ATLAS_NOTIFICATIONS for alerting</text>
  <text x="645" y="305" font-size="9" fill="#888">Health check: HTTP :10001/health</text>

  <!-- Architecture -->
  <rect x="20" y="365" width="1160" height="200" rx="8" fill="white" stroke="#555" stroke-width="1" filter="url(#s)"/>
  <text x="600" y="390" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">SOAR Script Architecture</text>
  <text x="40" y="415" font-size="10" font-weight="bold" fill="#333">IEventHandler Interface:</text>
  <text x="40" y="435" font-size="9" fill="#555">on_event(event) → called per security event from Kafka/gRPC data</text>
  <text x="40" y="451" font-size="9" fill="#555">on_batch(events) → batch processing for high-volume events</text>
  <text x="40" y="467" font-size="9" fill="#555">configure(params) → initialization with connection/API key params</text>
  <text x="600" y="415" font-size="10" font-weight="bold" fill="#333">IScheduler Interface:</text>
  <text x="600" y="435" font-size="9" fill="#555">run() → periodic task execution (polling, enrichment)</text>
  <text x="600" y="451" font-size="9" fill="#555">schedule → cron-like scheduling expression</text>
  <text x="600" y="467" font-size="9" fill="#555">configure(params) → initialization</text>
  <text x="40" y="495" font-size="10" font-weight="bold" fill="#333">Isolation:</text>
  <text x="40" y="515" font-size="9" fill="#555">Each flow gets its own Python virtual environment (venv) — complete dependency isolation</text>
  <text x="40" y="531" font-size="9" fill="#555">Scripts installed from pip packages or custom repos — requirements.txt per script</text>
  <text x="40" y="547" font-size="9" fill="#555">Script configs stored in flow config (Vault-encrypted secrets for API keys)</text>

  <!-- Dependencies -->
  <rect x="20" y="585" width="1160" height="195" rx="6" fill="white" stroke="#555" stroke-width="1" filter="url(#s)"/>
  <text x="600" y="610" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Dependencies &amp; Integration Points</text>
  <text x="40" y="635" font-size="10" fill="#555">• Dapr PubSub / Kafka (Cloud) — Consumes SOC_INSIGHTS events per flow</text>
  <text x="40" y="655" font-size="10" fill="#555">• cdc.grpc-in (On-Prem) — Provides event data via gRPC stream</text>
  <text x="40" y="675" font-size="10" fill="#555">• Config Manager — Delivers soar-light config (cm-soar_light topic)</text>
  <text x="40" y="695" font-size="10" fill="#555">• HashiCorp Vault — API keys, OAuth tokens for external integrations</text>
  <text x="40" y="715" font-size="10" fill="#555">• Python 3.9+ — Script runtime with pip package management</text>
  <text x="600" y="635" font-size="10" fill="#555">• External SOAR: Slack, Teams, ServiceNow, Jira, PagerDuty</text>
  <text x="600" y="655" font-size="10" fill="#555">• External Security: CrowdStrike, Qualys, VirusTotal, Carbon Black</text>
  <text x="600" y="675" font-size="10" fill="#555">• External IR: Phantom, XSOAR, TheHive, MISP</text>
  <text x="600" y="695" font-size="10" fill="#555">• Packages: cmd/, pkg/soar/, scripts/, pkg/event/, pkg/scheduler/</text>
  <text x="40" y="760" font-size="9" fill="#888">Ports: Dapr 8082 (Cloud) | Health 10001 | Kafka topic: {acctId}_{flowId}_soar_{dataType}</text>
</svg>