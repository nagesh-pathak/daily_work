<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#555"/></marker>
    <filter id="s"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1300" height="900" fill="#f8f9fa" rx="6"/>
  <rect x="0" y="0" width="1300" height="50" fill="#BF360C"/>
  <text x="650" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">cdc.flume — Apache Flume 1.9.0 Central Transform &amp; Routing Engine</text>

  <rect x="20" y="60" width="1260" height="30" rx="4" fill="#FBE9E7" stroke="#BF360C" stroke-width="1"/>
  <text x="650" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#BF360C">On-Prem Only — Central data pipeline. Jinja2 template config generation. Supervisor manages 6 processes. Sources → Channels → Sinks.</text>

  <!-- SOURCES -->
  <rect x="20" y="100" width="300" height="260" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" filter="url(#s)"/>
  <text x="170" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1565C0">Flume Sources</text>

  <rect x="35" y="140" width="270" height="55" rx="5" fill="white" stroke="#1565C0"/>
  <text x="170" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">DNS SpoolDir Source</text>
  <text x="50" y="175" font-size="9" fill="#555">Dir: /infoblox/data/in/flume/dns/</text>
  <text x="50" y="188" font-size="9" fill="#555">From: cdc.dns-in (decompressed captures)</text>

  <rect x="35" y="205" width="270" height="55" rx="5" fill="white" stroke="#C62828"/>
  <text x="170" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#C62828">RPZ Multiport Syslog Source</text>
  <text x="50" y="240" font-size="9" fill="#555">Port 514 (TCP syslog from rsyslog)</text>
  <text x="50" y="253" font-size="9" fill="#555">From: cdc.rpz-in (stunnel→rsyslog)</text>

  <rect x="35" y="270" width="270" height="55" rx="5" fill="white" stroke="#F57F17"/>
  <text x="170" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#F57F17">IPMeta SpoolDir Source</text>
  <text x="50" y="305" font-size="9" fill="#555">Dir: /infoblox/data/in/flume/ipmeta/</text>
  <text x="50" y="318" font-size="9" fill="#555">From: cdc.wapi-in (Avro files)</text>

  <!-- CHANNELS -->
  <rect x="340" y="100" width="300" height="260" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2" filter="url(#s)"/>
  <text x="490" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Memory Channels</text>

  <rect x="355" y="140" width="270" height="40" rx="4" fill="white" stroke="#E65100"/>
  <text x="490" y="158" text-anchor="middle" font-size="10" fill="#555">dns-to-csv (500K capacity)</text>
  <text x="490" y="172" text-anchor="middle" font-size="8" fill="#888">DNS → CSV for Splunk</text>

  <rect x="355" y="188" width="270" height="40" rx="4" fill="white" stroke="#E65100"/>
  <text x="490" y="206" text-anchor="middle" font-size="10" fill="#555">dns-to-cefleef (500K capacity)</text>
  <text x="490" y="220" text-anchor="middle" font-size="8" fill="#888">DNS → CEF/LEEF for SIEM</text>

  <rect x="355" y="236" width="270" height="40" rx="4" fill="white" stroke="#E65100"/>
  <text x="490" y="254" text-anchor="middle" font-size="10" fill="#555">dns-to-cloud (1M capacity)</text>
  <text x="490" y="268" text-anchor="middle" font-size="8" fill="#888">DNS → Parquet for cloud upload</text>

  <rect x="355" y="284" width="270" height="28" rx="4" fill="white" stroke="#E65100"/>
  <text x="490" y="302" text-anchor="middle" font-size="10" fill="#555">rpz-to-csv, rpz-to-cefleef, rpz-to-cloud (4M)</text>

  <rect x="355" y="320" width="270" height="28" rx="4" fill="white" stroke="#E65100"/>
  <text x="490" y="338" text-anchor="middle" font-size="10" fill="#555">ipmeta-to-cloud (500K capacity)</text>

  <!-- SINKS -->
  <rect x="660" y="100" width="620" height="260" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" filter="url(#s)"/>
  <text x="970" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Java Sinks (Custom Flume Sinks)</text>

  <rect x="675" y="140" width="290" height="55" rx="5" fill="white" stroke="#2E7D32"/>
  <text x="820" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">DnsToCsv Sink</text>
  <text x="690" y="175" font-size="9" fill="#555">→ /data/out/splunk/nios/dns/</text>
  <text x="690" y="188" font-size="9" fill="#555">CSV format for Splunk UF</text>

  <rect x="975" y="140" width="290" height="55" rx="5" fill="white" stroke="#2E7D32"/>
  <text x="1120" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">DnsToCefLeef Sink</text>
  <text x="990" y="175" font-size="9" fill="#555">→ /data/out/siem/nios/dns/{cef,leef}/</text>
  <text x="990" y="188" font-size="9" fill="#555">CEF/LEEF for ArcSight/QRadar</text>

  <rect x="675" y="205" width="290" height="55" rx="5" fill="white" stroke="#2E7D32"/>
  <text x="820" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">DnsToJson Sink</text>
  <text x="690" y="240" font-size="9" fill="#555">→ /data/out/syslog/nios/dns/</text>
  <text x="690" y="253" font-size="9" fill="#555">JSON for syslog-out forwarding</text>

  <rect x="975" y="205" width="290" height="55" rx="5" fill="white" stroke="#2E7D32"/>
  <text x="1120" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">CloudFileSink</text>
  <text x="990" y="240" font-size="9" fill="#555">→ /data/out/cloud/{dns,rpz,ipmeta}/</text>
  <text x="990" y="253" font-size="9" fill="#555">Parquet for cdc.rest-out upload</text>

  <rect x="675" y="270" width="290" height="55" rx="5" fill="white" stroke="#2E7D32"/>
  <text x="820" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">RpzToCsv Sink</text>
  <text x="690" y="305" font-size="9" fill="#555">→ /data/out/splunk/nios/rpz/</text>
  <text x="690" y="318" font-size="9" fill="#555">CSV RPZ data for Splunk UF</text>

  <rect x="975" y="270" width="290" height="55" rx="5" fill="white" stroke="#2E7D32"/>
  <text x="1120" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">RpzToCefLeef Sink</text>
  <text x="990" y="305" font-size="9" fill="#555">→ /data/out/siem/nios/rpz/{cef,leef}/</text>
  <text x="990" y="318" font-size="9" fill="#555">CEF/LEEF RPZ for SIEM</text>

  <!-- Arrows Sources → Channels -->
  <line x1="322" y1="170" x2="353" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="322" y1="230" x2="353" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="322" y1="300" x2="353" y2="330" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Arrows Channels → Sinks -->
  <line x1="627" y1="160" x2="673" y2="167" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="627" y1="210" x2="673" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="627" y1="260" x2="673" y2="260" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Config Generation -->
  <rect x="20" y="380" width="1260" height="170" rx="8" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2" filter="url(#s)"/>
  <text x="650" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">Configuration Generation (Jinja2 Templates)</text>

  <rect x="40" y="420" width="390" height="115" rx="5" fill="white" stroke="#6A1B9A"/>
  <text x="235" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">Template Engine</text>
  <text x="55" y="460" font-size="9" fill="#555">• Jinja2 templates generate flume.conf</text>
  <text x="55" y="476" font-size="9" fill="#555">• Template variables from CDC API / infraservice config</text>
  <text x="55" y="492" font-size="9" fill="#555">• Dynamic source/channel/sink wiring per flow</text>
  <text x="55" y="508" font-size="9" fill="#555">• Merges configs from all containers (dns_in, rpz_in, etc.)</text>
  <text x="55" y="524" font-size="9" fill="#555">• Published to cm-flume topic for Config Manager delivery</text>

  <rect x="450" y="420" width="400" height="115" rx="5" fill="white" stroke="#6A1B9A"/>
  <text x="650" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">Supervisor Process Management (6 processes)</text>
  <text x="465" y="460" font-size="9" fill="#555">1. flume-dns — DNS source + csv/cefleef/json/cloud sinks</text>
  <text x="465" y="476" font-size="9" fill="#555">2. flume-rpz — RPZ source + csv/cefleef/cloud sinks</text>
  <text x="465" y="492" font-size="9" fill="#555">3. flume-ipmeta — IPMeta source + cloud sink</text>
  <text x="465" y="508" font-size="9" fill="#555">4. flume-http — HTTP output channel (optional)</text>
  <text x="465" y="524" font-size="9" fill="#555">5. config-watcher — Monitors for config updates</text>

  <rect x="870" y="420" width="390" height="115" rx="5" fill="white" stroke="#6A1B9A"/>
  <text x="1065" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A1B9A">Channel Capacities</text>
  <text x="885" y="460" font-size="9" fill="#555">dns-to-csv: 500,000 events</text>
  <text x="885" y="476" font-size="9" fill="#555">dns-to-cefleef: 500,000 events</text>
  <text x="885" y="492" font-size="9" fill="#555">dns-to-cloud: 1,000,000 events</text>
  <text x="885" y="508" font-size="9" fill="#555">rpz-to-*: 4,000,000 events each</text>
  <text x="885" y="524" font-size="9" fill="#555">ipmeta-to-cloud: 500,000 events</text>

  <!-- Output Destinations -->
  <rect x="20" y="570" width="1260" height="140" rx="8" fill="white" stroke="#555" stroke-width="1" filter="url(#s)"/>
  <text x="650" y="595" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Output Directories → Downstream Consumers</text>

  <rect x="40" y="610" width="230" height="45" rx="4" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="155" y="628" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">/data/out/splunk/</text>
  <text x="155" y="648" text-anchor="middle" font-size="9" fill="#555">→ cdc.splunk-out (Splunk UF)</text>

  <rect x="290" y="610" width="230" height="45" rx="4" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="405" y="628" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">/data/out/siem/</text>
  <text x="405" y="648" text-anchor="middle" font-size="9" fill="#555">→ cdc.siem-out (ArcSight/QRadar)</text>

  <rect x="540" y="610" width="230" height="45" rx="4" fill="#FFF3E0" stroke="#E65100"/>
  <text x="655" y="628" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">/data/out/cloud/</text>
  <text x="655" y="648" text-anchor="middle" font-size="9" fill="#555">→ cdc.rest-out (Cloud upload)</text>

  <rect x="790" y="610" width="240" height="45" rx="4" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="910" y="628" text-anchor="middle" font-size="10" font-weight="bold" fill="#6A1B9A">/data/out/syslog/</text>
  <text x="910" y="648" text-anchor="middle" font-size="9" fill="#555">→ cdc.syslog-out (Syslog fwd)</text>

  <rect x="1050" y="610" width="210" height="45" rx="4" fill="#FCE4EC" stroke="#C62828"/>
  <text x="1155" y="628" text-anchor="middle" font-size="10" font-weight="bold" fill="#C62828">/data/out/reporting/</text>
  <text x="1155" y="648" text-anchor="middle" font-size="9" fill="#555">→ cdc.reporting-out</text>

  <!-- Dependencies -->
  <rect x="20" y="730" width="1260" height="150" rx="6" fill="white" stroke="#555" stroke-width="1" filter="url(#s)"/>
  <text x="650" y="755" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Dependencies &amp; Technology Stack</text>
  <text x="40" y="780" font-size="10" fill="#555">• Apache Flume 1.9.0 — Core data pipeline framework (Source → Channel → Sink)</text>
  <text x="40" y="800" font-size="10" fill="#555">• Java 11 — Custom sink implementations (DnsToCsv, DnsToCefLeef, DnsToJson, CloudFileSink, RpzToCsv, RpzToCefLeef)</text>
  <text x="40" y="820" font-size="10" fill="#555">• Jinja2 (Python) — Template-based config generation for flume.conf</text>
  <text x="40" y="840" font-size="10" fill="#555">• supervisord — Process management for multiple Flume agent instances</text>
  <text x="650" y="780" font-size="10" fill="#555">• cdc.dns-in — DNS data source (SpoolDir)</text>
  <text x="650" y="800" font-size="10" fill="#555">• cdc.rpz-in — RPZ data source (syslog TCP)</text>
  <text x="650" y="820" font-size="10" fill="#555">• cdc.wapi-in — IPMeta data source (SpoolDir)</text>
  <text x="650" y="840" font-size="10" fill="#555">• cdc.infraservice — Config management (cm-cdc-infra topic)</text>
  <text x="40" y="862" font-size="9" fill="#888">Config delivery: cdc.api generates unified flume config → publishes to cm-flume-{env} → Config Manager delivers to on-prem host</text>
</svg>