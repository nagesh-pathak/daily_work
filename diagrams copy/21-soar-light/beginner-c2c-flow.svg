<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 26px; font-weight: 700; fill: #1a1a2e; }
      .subtitle { font-size: 14px; fill: #666; }
      .step-num { font-size: 22px; font-weight: 800; fill: #fff; }
      .step-label { font-size: 13px; font-weight: 600; fill: #333; }
      .step-desc { font-size: 11px; fill: #555; }
      .box-label { font-size: 13px; font-weight: 700; fill: #fff; }
      .box-desc { font-size: 10px; fill: #fff; opacity: 0.9; }
      .flow-label { font-size: 11px; fill: #e74c3c; font-weight: 600; }
      .note { font-size: 11px; fill: #666; font-style: italic; }
      .code { font-family: 'Consolas', monospace; font-size: 10px; fill: #333; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980b9"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="850" rx="12" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" class="title">C2C (Cloud-to-Cloud) Flow — Step by Step</text>
  <text x="600" y="55" text-anchor="middle" class="subtitle">Everything runs in the cloud. Data source: BloxOne. No on-prem appliance needed.</text>

  <!-- ═══════════ STEP 1: Customer creates flow ═══════════ -->
  <circle cx="65" cy="100" r="20" fill="#e74c3c"/>
  <text x="65" y="107" text-anchor="middle" class="step-num">1</text>
  <text x="95" y="96" class="step-label">Customer creates a "Flow" in the Infoblox Portal</text>
  <text x="95" y="112" class="step-desc">Uploads Python script + picks data type (SERVICE_LOG) + sets API tokens</text>

  <!-- Customer icon -->
  <rect x="40" y="130" width="120" height="55" rx="8" fill="#8e44ad" filter="url(#shadow)"/>
  <text x="100" y="153" text-anchor="middle" class="box-label">Customer</text>
  <text x="100" y="168" text-anchor="middle" class="box-desc">Portal UI</text>

  <!-- Arrow to API -->
  <line x1="160" y1="157" x2="215" y2="157" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="187" y="150" text-anchor="middle" class="flow-label">POST</text>

  <!-- API Service -->
  <rect x="220" y="130" width="160" height="55" rx="8" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="300" y="150" text-anchor="middle" class="box-label">cdc.flow.api.service</text>
  <text x="300" y="165" text-anchor="middle" class="box-desc">Saves flow to PostgreSQL</text>
  <text x="300" y="177" text-anchor="middle" class="box-desc">Pubishes "new flow!" to Kafka</text>

  <!-- Arrow to soar-light -->
  <line x1="380" y1="157" x2="445" y2="157" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="413" y="149" text-anchor="middle" class="flow-label">Dapr</text>
  <text x="413" y="162" text-anchor="middle" class="flow-label">PubSub</text>

  <!-- ═══════════ STEP 2: soar-light receives config ═══════════ -->
  <circle cx="65" cy="235" r="20" fill="#e74c3c"/>
  <text x="65" y="242" text-anchor="middle" class="step-num">2</text>
  <text x="95" y="231" class="step-label">cdc.flow.api.service creates 2 pods per flow: grpc-in "-in" pod + soar-light "-out" pod</text>
  <text x="95" y="247" class="step-desc">The "-out" pod creates an isolated Python environment, puts your script in it, starts a Python process</text>

  <!-- soar-light Go binary -->
  <rect x="450" y="130" width="200" height="55" rx="8" fill="#e67e22" filter="url(#shadow)"/>
  <text x="550" y="150" text-anchor="middle" class="box-label">soar-light (Go binary)</text>
  <text x="550" y="165" text-anchor="middle" class="box-desc">The "manager" — creates venv,</text>
  <text x="550" y="177" text-anchor="middle" class="box-desc">spawns Python process</text>

  <!-- Arrow down to venv -->
  <line x1="550" y1="185" x2="550" y2="230" stroke="#e67e22" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Venv box -->
  <rect x="450" y="235" width="200" height="70" rx="8" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <text x="460" y="253" class="code">venv-43310/</text>
  <text x="460" y="267" class="code">  └── src/</text>
  <text x="460" y="281" class="code">      ├── infoblox_driver.py</text>
  <text x="460" y="295" class="code">      └── YOUR_script.py</text>

  <!-- Arrow from venv to Python process -->
  <line x1="550" y1="305" x2="550" y2="340" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Python Process -->
  <rect x="450" y="345" width="200" height="50" rx="8" fill="#3498db" filter="url(#shadow)"/>
  <text x="550" y="366" text-anchor="middle" class="box-label">Python Process</text>
  <text x="550" y="381" text-anchor="middle" class="box-desc">python3 infoblox_driver.py</text>

  <!-- ═══════════ STEP 3: Events flow through Kafka ═══════════ -->
  <circle cx="65" cy="380" r="20" fill="#e74c3c"/>
  <text x="65" y="387" text-anchor="middle" class="step-num">3</text>
  <text x="95" y="376" class="step-label">Meanwhile: DNS events flow through Kafka</text>
  <text x="95" y="392" class="step-desc">BloxOne generates events → Raw topic → kafka.flow.processor sorts them → Destination topic</text>

  <!-- BloxOne -->
  <rect x="40" y="420" width="130" height="55" rx="8" fill="#16a085" filter="url(#shadow)"/>
  <text x="105" y="443" text-anchor="middle" class="box-label">BloxOne DDI</text>
  <text x="105" y="458" text-anchor="middle" class="box-desc">Cloud DNS service</text>
  <text x="105" y="469" text-anchor="middle" class="box-desc">generates DNS events</text>

  <!-- Arrow to Raw Kafka -->
  <line x1="170" y1="447" x2="215" y2="447" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Raw Kafka Topic -->
  <rect x="220" y="420" width="160" height="55" rx="8" fill="#d35400" filter="url(#shadow)"/>
  <text x="300" y="440" text-anchor="middle" class="box-label">Kafka Raw Topic</text>
  <text x="300" y="455" text-anchor="middle" class="box-desc" font-family="Consolas, monospace">2010205_flowID43310</text>
  <text x="300" y="467" text-anchor="middle" class="box-desc" font-family="Consolas, monospace">_SERVICE_LOG</text>

  <!-- Arrow to KFP -->
  <line x1="380" y1="447" x2="445" y2="447" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- KFP -->
  <rect x="450" y="420" width="200" height="55" rx="8" fill="#c0392b" filter="url(#shadow)"/>
  <text x="550" y="440" text-anchor="middle" class="box-label">kafka.flow.processor</text>
  <text x="550" y="455" text-anchor="middle" class="box-desc">The "mail sorter" — copies events</text>
  <text x="550" y="467" text-anchor="middle" class="box-desc">to destination-specific topics</text>

  <!-- Arrow to Dest Topic -->
  <line x1="650" y1="447" x2="715" y2="447" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Destination Kafka Topic -->
  <rect x="720" y="420" width="200" height="55" rx="8" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="820" y="440" text-anchor="middle" class="box-label">SOAR-Light Kafka Topic</text>
  <text x="820" y="455" text-anchor="middle" class="box-desc" font-family="Consolas, monospace">2010205_43310_SOAR_LIGHT</text>
  <text x="820" y="467" text-anchor="middle" class="box-desc" font-family="Consolas, monospace">_SERVICE_LOG</text>

  <!-- ═══════════ STEP 4: Python reads from Kafka ═══════════ -->
  <circle cx="65" cy="530" r="20" fill="#e74c3c"/>
  <text x="65" y="537" text-anchor="middle" class="step-num">4</text>
  <text x="95" y="526" class="step-label">Python process reads events from Kafka and calls YOUR script</text>
  <text x="95" y="542" class="step-desc">Infinite loop: read message → call your process(context, event) → process next message</text>

  <!-- Connect dest topic to Python -->
  <path d="M 820 475 L 820 530 L 660 530 L 660 370 L 650 370" stroke="#2980b9" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="750" y="520" class="flow-label" fill="#2980b9">Kafka Consumer</text>

  <!-- Python to Your Script flow (bottom area) -->
  <rect x="40" y="570" width="1120" height="130" rx="10" fill="#fff" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>

  <!-- Inside the processing box -->
  <text x="60" y="595" class="step-label">Inside your Python process (infinite loop):</text>

  <!-- Message from Kafka -->
  <rect x="60" y="610" width="180" height="45" rx="6" fill="#ebf5fb" stroke="#3498db"/>
  <text x="150" y="630" text-anchor="middle" class="code">Kafka delivers message:</text>
  <text x="150" y="645" text-anchor="middle" class="code">{"query":"evil.com",...}</text>

  <line x1="240" y1="632" x2="275" y2="632" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Driver calls process -->
  <rect x="280" y="610" width="180" height="45" rx="6" fill="#ebf5fb" stroke="#3498db"/>
  <text x="370" y="630" text-anchor="middle" class="code">Driver calls:</text>
  <text x="370" y="645" text-anchor="middle" class="code">plugin.process(ctx, event)</text>

  <line x1="460" y1="632" x2="495" y2="632" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Your code runs -->
  <rect x="500" y="610" width="200" height="45" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <text x="600" y="627" text-anchor="middle" class="code" font-weight="700" fill="#27ae60">YOUR CODE RUNS HERE!</text>
  <text x="600" y="642" text-anchor="middle" class="code">json.loads(event)</text>
  <text x="600" y="655" text-anchor="middle" class="code">if evil → create Jira ticket</text>

  <line x1="700" y1="632" x2="735" y2="632" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- External destination -->
  <rect x="740" y="610" width="140" height="45" rx="6" fill="#27ae60"/>
  <text x="810" y="630" text-anchor="middle" class="box-label">Jira / Slack</text>
  <text x="810" y="645" text-anchor="middle" class="box-desc">PagerDuty / API</text>

  <line x1="880" y1="632" x2="910" y2="632" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Loop back -->
  <rect x="915" y="610" width="110" height="45" rx="6" fill="#ebf5fb" stroke="#3498db"/>
  <text x="970" y="630" text-anchor="middle" class="code">Loop continues</text>
  <text x="970" y="645" text-anchor="middle" class="code">→ next message</text>

  <!-- 5-second timeout note -->
  <text x="600" y="690" text-anchor="middle" class="note">5-second timeout: if your script takes longer than 5 seconds per event, it's killed and the next event is processed</text>

  <!-- ═══════════ STEP 5: Summary ═══════════ -->
  <circle cx="65" cy="740" r="20" fill="#e74c3c"/>
  <text x="65" y="747" text-anchor="middle" class="step-num">5</text>
  <text x="95" y="740" class="step-label">That's the complete C2C flow! Here's the summary:</text>

  <!-- Summary flow -->
  <rect x="40" y="760" width="1120" height="70" rx="10" fill="#2c3e50"/>

  <rect x="55" y="775" width="100" height="35" rx="5" fill="#16a085"/>
  <text x="105" y="797" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">BloxOne DNS</text>

  <line x1="155" y1="792" x2="180" y2="792" stroke="#ecf0f1" stroke-width="2"/>
  <text x="167" y="787" fill="#ecf0f1" font-size="18">→</text>

  <rect x="185" y="775" width="100" height="35" rx="5" fill="#d35400"/>
  <text x="235" y="797" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Raw Kafka</text>

  <line x1="285" y1="792" x2="310" y2="792" stroke="#ecf0f1" stroke-width="2"/>
  <text x="297" y="787" fill="#ecf0f1" font-size="18">→</text>

  <rect x="315" y="775" width="130" height="35" rx="5" fill="#c0392b"/>
  <text x="380" y="797" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">kafka.flow.processor</text>

  <line x1="445" y1="792" x2="470" y2="792" stroke="#ecf0f1" stroke-width="2"/>
  <text x="457" y="787" fill="#ecf0f1" font-size="18">→</text>

  <rect x="475" y="775" width="130" height="35" rx="5" fill="#e74c3c"/>
  <text x="540" y="797" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">SOAR-Light Topic</text>

  <line x1="605" y1="792" x2="630" y2="792" stroke="#ecf0f1" stroke-width="2"/>
  <text x="617" y="787" fill="#ecf0f1" font-size="18">→</text>

  <rect x="635" y="775" width="130" height="35" rx="5" fill="#3498db"/>
  <text x="700" y="797" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Python Consumer</text>

  <line x1="765" y1="792" x2="790" y2="792" stroke="#ecf0f1" stroke-width="2"/>
  <text x="777" y="787" fill="#ecf0f1" font-size="18">→</text>

  <rect x="795" y="775" width="110" height="35" rx="5" fill="#8e44ad"/>
  <text x="850" y="797" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">YOUR Script</text>

  <line x1="905" y1="792" x2="930" y2="792" stroke="#ecf0f1" stroke-width="2"/>
  <text x="917" y="787" fill="#ecf0f1" font-size="18">→</text>

  <rect x="935" y="775" width="110" height="35" rx="5" fill="#27ae60"/>
  <text x="990" y="797" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Jira / Slack / API</text>

  <text x="600" y="818" text-anchor="middle" fill="#ecf0f1" font-size="11">4 hops total  •  All in the cloud  •  ~seconds of latency</text>
</svg>