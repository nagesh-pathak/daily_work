<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrG" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="arrO" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#E65100"/></marker>
    <linearGradient id="hd" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0D47A1"/><stop offset="100%" style="stop-color:#1565C0"/></linearGradient>
    <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>

  <rect width="1200" height="900" fill="#f8f9fa" rx="6"/>
  <rect x="0" y="0" width="1200" height="55" fill="url(#hd)"/>
  <text x="600" y="35" text-anchor="middle" fill="white" font-size="20" font-weight="bold">cdc.grpc-in — Cloud Data Ingestion &amp; Transformation Service</text>

  <!-- ===== CLOUD MODE (Top half) ===== -->
  <rect x="20" y="70" width="1160" height="380" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" filter="url(#sh)"/>
  <text x="600" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#1B5E20">CLOUD MODE (Kubernetes + Dapr + Kafka)</text>

  <!-- Dapr Subscriber -->
  <rect x="40" y="110" width="200" height="80" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="140" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Dapr Subscriber</text>
  <text x="140" y="148" text-anchor="middle" font-size="9" fill="#555">gRPC server (configurable port)</text>
  <text x="140" y="162" text-anchor="middle" font-size="9" fill="#555">Receives FlowEvents &amp;</text>
  <text x="140" y="175" text-anchor="middle" font-size="9" fill="#555">DestinationEvents (CREATE/</text>
  <text x="140" y="185" text-anchor="middle" font-size="9" fill="#555">UPDATE/DELETE)</text>

  <!-- Cloud Config Manager -->
  <rect x="280" y="110" width="200" height="80" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="380" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Cloud Config Manager</text>
  <text x="380" y="148" text-anchor="middle" font-size="9" fill="#555">Thread-safe flow storage</text>
  <text x="380" y="162" text-anchor="middle" font-size="9" fill="#555">(Singleton pattern)</text>
  <text x="380" y="176" text-anchor="middle" font-size="9" fill="#555">Manages: FlowConfig,</text>
  <text x="380" y="186" text-anchor="middle" font-size="9" fill="#555">DestinationConfig</text>

  <!-- arrows -->
  <line x1="242" y1="150" x2="278" y2="150" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Kafka Consumer Manager -->
  <rect x="520" y="110" width="200" height="80" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="620" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Kafka Consumer Mgr</text>
  <text x="620" y="148" text-anchor="middle" font-size="9" fill="#555">Per-flow Kafka readers</text>
  <text x="620" y="162" text-anchor="middle" font-size="9" fill="#555">Group: cdc-grpc-in-{flowId}</text>
  <text x="620" y="176" text-anchor="middle" font-size="9" fill="#555">Topic validation + retry</text>
  <text x="620" y="186" text-anchor="middle" font-size="9" fill="#555">Auto topic existence check</text>

  <line x1="482" y1="150" x2="518" y2="150" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Input Topics -->
  <rect x="520" y="210" width="200" height="60" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="620" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">Kafka Input Topics</text>
  <text x="620" y="248" text-anchor="middle" font-size="9" fill="#555">{accountID}_flowID{flowID}_{dataType}</text>
  <text x="620" y="262" text-anchor="middle" font-size="9" fill="#555">Parquet binary data messages</text>

  <line x1="620" y1="192" x2="620" y2="208" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Worker Pool -->
  <rect x="760" y="110" width="180" height="80" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="850" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Worker Pool</text>
  <text x="850" y="148" text-anchor="middle" font-size="9" fill="#555">Configurable goroutines</text>
  <text x="850" y="162" text-anchor="middle" font-size="9" fill="#555">Parallel message processing</text>
  <text x="850" y="176" text-anchor="middle" font-size="9" fill="#555">Parser pool (object reuse)</text>

  <line x1="722" y1="240" x2="760" y2="160" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Parser System -->
  <rect x="760" y="210" width="180" height="105" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="850" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Parser System</text>
  <text x="850" y="248" text-anchor="middle" font-size="9" fill="#555">Parquet → Output formats:</text>
  <text x="780" y="264" font-size="9" fill="#555">• CSV (tab/comma delimited)</text>
  <text x="780" y="278" font-size="9" fill="#555">• CEF (ArcSight)</text>
  <text x="780" y="292" font-size="9" fill="#555">• LEEF (QRadar)</text>
  <text x="780" y="306" font-size="9" fill="#555">• JSON / ASIM / Splunk CIM</text>

  <line x1="850" y1="192" x2="850" y2="208" stroke="#E65100" stroke-width="2" marker-end="url(#arrO)"/>

  <!-- Kafka Producer -->
  <rect x="980" y="110" width="180" height="80" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="1070" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Kafka Producer</text>
  <text x="1070" y="148" text-anchor="middle" font-size="9" fill="#555">Shared singleton</text>
  <text x="1070" y="162" text-anchor="middle" font-size="9" fill="#555">LeastBytes balancing</text>
  <text x="1070" y="176" text-anchor="middle" font-size="9" fill="#555">RequireOne acks</text>

  <line x1="942" y1="150" x2="978" y2="150" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Output Topics -->
  <rect x="980" y="210" width="180" height="60" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="1070" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">Kafka Output Topics</text>
  <text x="1070" y="250" text-anchor="middle" font-size="9" fill="#555">{acctId}_{flowId}_{dest}_{type}</text>
  <text x="1070" y="264" text-anchor="middle" font-size="9" fill="#555">→ syslog-out, http-out, soar-light</text>

  <line x1="1070" y1="192" x2="1070" y2="208" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Data Types box -->
  <rect x="40" y="290" width="450" height="145" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="265" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">Supported Data Types (Cloud)</text>
  <text x="60" y="332" font-size="10" fill="#555">• TD_QUERY_RESP_LOG — Threat Defense DNS query/response</text>
  <text x="60" y="348" font-size="10" fill="#555">• TD_THREAT_FEEDS_HITS_LOG — Threat feed RPZ hits</text>
  <text x="60" y="364" font-size="10" fill="#555">• DDI_QUERY_RESP_LOG — DDI DNS query/response</text>
  <text x="60" y="380" font-size="10" fill="#555">• DDI_DHCP_LEASE_LOG — DHCP lease events (protobuf)</text>
  <text x="60" y="396" font-size="10" fill="#555">• AUDIT_LOG | SERVICE_LOG | ATLAS_NOTIFICATIONS</text>
  <text x="60" y="412" font-size="10" fill="#555">• SOC_INSIGHTS | SOC_INSIGHTS_V2</text>
  <text x="60" y="428" font-size="10" fill="#555">Input: xitongsys/parquet-go library for Parquet deserialization</text>

  <!-- Metrics & Health -->
  <rect x="980" y="290" width="180" height="60" rx="6" fill="white" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="1070" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B1FA2">Metrics &amp; Health</text>
  <text x="1070" y="328" text-anchor="middle" font-size="9" fill="#555">Prometheus :9152</text>
  <text x="1070" y="342" text-anchor="middle" font-size="9" fill="#555">Health/Ready :8081</text>

  <!-- ===== ON-PREM MODE (Bottom half) ===== -->
  <rect x="20" y="465" width="1160" height="280" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" filter="url(#sh)"/>
  <text x="600" y="487" text-anchor="middle" font-size="15" font-weight="bold" fill="#BF360C">ON-PREMISES MODE (gRPC Client + File System)</text>

  <!-- Config File -->
  <rect x="40" y="505" width="180" height="60" rx="6" fill="white" stroke="#E65100" stroke-width="1.5"/>
  <text x="130" y="527" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Config File</text>
  <text x="130" y="543" text-anchor="middle" font-size="9" fill="#555">/opt/grpc_in/conf/grpc_in.json</text>
  <text x="130" y="557" text-anchor="middle" font-size="9" fill="#555">File watcher (hot reload)</text>

  <!-- gRPC Client -->
  <rect x="260" y="505" width="200" height="70" rx="6" fill="white" stroke="#E65100" stroke-width="1.5"/>
  <text x="360" y="527" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">gRPC Client</text>
  <text x="360" y="543" text-anchor="middle" font-size="9" fill="#555">Connects to data-exporter-kafka</text>
  <text x="360" y="557" text-anchor="middle" font-size="9" fill="#555">Subscribe(flowIds) → stream</text>
  <text x="360" y="571" text-anchor="middle" font-size="9" fill="#555">Also DsClient (new streaming)</text>

  <line x1="222" y1="535" x2="258" y2="535" stroke="#E65100" stroke-width="2" marker-end="url(#arrO)"/>

  <!-- Data Cache -->
  <rect x="500" y="505" width="180" height="60" rx="6" fill="white" stroke="#E65100" stroke-width="1.5"/>
  <text x="590" y="527" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Data Cache</text>
  <text x="590" y="543" text-anchor="middle" font-size="9" fill="#555">In-memory buffer (DataLog)</text>
  <text x="590" y="557" text-anchor="middle" font-size="9" fill="#555">Thread-safe, cleanup mechanism</text>

  <line x1="462" y1="540" x2="498" y2="535" stroke="#E65100" stroke-width="2" marker-end="url(#arrO)"/>

  <!-- Parser -->
  <rect x="720" y="505" width="180" height="60" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="810" y="527" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Parser System</text>
  <text x="810" y="543" text-anchor="middle" font-size="9" fill="#555">Same parsers as cloud mode</text>
  <text x="810" y="557" text-anchor="middle" font-size="9" fill="#555">Parquet → target format</text>

  <line x1="682" y1="535" x2="718" y2="535" stroke="#E65100" stroke-width="2" marker-end="url(#arrO)"/>

  <!-- File System Output -->
  <rect x="940" y="505" width="220" height="70" rx="6" fill="white" stroke="#E65100" stroke-width="1.5"/>
  <text x="1050" y="527" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Output Destinations</text>
  <text x="1050" y="543" text-anchor="middle" font-size="9" fill="#555">File System: /infoblox/data/out/</text>
  <text x="1050" y="557" text-anchor="middle" font-size="9" fill="#555">{siem,splunk,http,reporting}/</text>
  <text x="1050" y="571" text-anchor="middle" font-size="9" fill="#555">OR Soar-Light gRPC Server :9195</text>

  <line x1="902" y1="535" x2="938" y2="535" stroke="#E65100" stroke-width="2" marker-end="url(#arrO)"/>

  <!-- On-prem flow config detail -->
  <rect x="40" y="600" width="500" height="130" rx="6" fill="white" stroke="#795548" stroke-width="1"/>
  <text x="290" y="620" text-anchor="middle" font-size="11" font-weight="bold" fill="#795548">On-Prem Flow Configuration (grpc_in.json)</text>
  <text x="60" y="640" font-size="9" fill="#555">{"file_config": {"flows": [{"id": 404, "data_types": [{"type": "DDI_DHCP_LEASE_LOG",</text>
  <text x="60" y="656" font-size="9" fill="#555">  "input_folder": "ddi/dhcp"}], "destination": "siem_out", "out_format": "cef"}],</text>
  <text x="60" y="672" font-size="9" fill="#555">  "account_id": "account_123"}, "parser_config": {...}}</text>
  <text x="60" y="695" font-size="9" fill="#888">Env vars: NS_OPH_ID, KAFKA_BROKERS, DAPR_SUBSCRIBER_ADDRESS, LOGGING_LEVEL</text>
  <text x="60" y="712" font-size="9" fill="#888">Config path: /opt/grpc_in/conf/grpc_in.json (hot-reloadable on-prem)</text>

  <!-- Key Dependencies -->
  <rect x="580" y="600" width="580" height="130" rx="6" fill="white" stroke="#795548" stroke-width="1"/>
  <text x="870" y="620" text-anchor="middle" font-size="11" font-weight="bold" fill="#795548">Key Dependencies &amp; Integration Points</text>
  <text x="600" y="640" font-size="9" fill="#555">• data-exporter-kafka (gRPC) — Source of log data for on-prem</text>
  <text x="600" y="656" font-size="9" fill="#555">• Kafka Brokers (TCP) — Input/output topic storage (cloud mode)</text>
  <text x="600" y="672" font-size="9" fill="#555">• Dapr PubSub (gRPC) — Flow/Destination config events (cloud mode)</text>
  <text x="600" y="688" font-size="9" fill="#555">• Soar-Light (gRPC :9195) — Application destination streaming</text>
  <text x="600" y="704" font-size="9" fill="#555">• xitongsys/parquet-go — Parquet deserialization library</text>
  <text x="600" y="720" font-size="9" fill="#555">• segmentio/kafka-go — Kafka consumer/producer (cloud mode)</text>

  <!-- Transformation Detail -->
  <rect x="20" y="755" width="1160" height="130" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="600" y="777" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">Data Transformation Pipeline</text>
  <text x="40" y="800" font-size="10" fill="#333">Kafka Message (Parquet Binary) → Buffer + Parse → Create typed structs (DnsLog, DhcpLease) → Filter NIOS events → Flatten nested structures</text>
  <text x="40" y="820" font-size="10" fill="#333">→ Apply format-specific formatting → Write to output (Kafka topic / File / gRPC stream)</text>
  <text x="40" y="845" font-size="10" fill="#555">DNS Fields: opcode, timestamp, qname, qtype, qclass, source, protocol, qip, rip, rcode, delay + 16 boolean flags + 6 resource record arrays (qrr1-3, rrr1-3)</text>
  <text x="40" y="865" font-size="10" fill="#555">DHCP Fields: IP, MAC, DUID, hostname, binding state, lease dates, device info, network view, extended attributes</text>
  <text x="40" y="880" font-size="10" fill="#888">Entry points: cmd/cloud/main.go (Cloud) | cmd/onprem/main.go (On-Prem) | cmd/clientstub/main.go (Dev/test)</text>
</svg>