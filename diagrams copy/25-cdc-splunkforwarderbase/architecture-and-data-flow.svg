<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#555"/></marker>
    <filter id="s"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="700" fill="#f8f9fa" rx="6"/>
  <rect x="0" y="0" width="1100" height="50" fill="#37474F"/>
  <text x="550" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">cdc.splunkforwarderbase — Splunk UF 9.1.0 Base Docker Image</text>

  <!-- Docker Layers -->
  <rect x="20" y="65" width="520" height="310" rx="8" fill="#ECEFF1" stroke="#37474F" stroke-width="2" filter="url(#s)"/>
  <text x="280" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474F">Docker Image Layers</text>
  <rect x="40" y="105" width="480" height="30" rx="4" fill="#CFD8DC" stroke="#37474F"/>
  <text x="280" y="125" text-anchor="middle" font-size="10" fill="#333">Alpine Linux 3.x + glibc (compatibility for Splunk binary)</text>
  <rect x="40" y="140" width="480" height="30" rx="4" fill="#B0BEC5" stroke="#37474F"/>
  <text x="280" y="160" text-anchor="middle" font-size="10" fill="#333">Splunk Universal Forwarder 9.1.0</text>
  <rect x="40" y="175" width="480" height="30" rx="4" fill="#90A4AE" stroke="#37474F"/>
  <text x="280" y="195" text-anchor="middle" font-size="10" fill="white">supervisord (process manager)</text>
  <rect x="40" y="210" width="480" height="30" rx="4" fill="#78909C" stroke="#37474F"/>
  <text x="280" y="230" text-anchor="middle" font-size="10" fill="white">config_writer (Jinja2 template renderer)</text>
  <rect x="40" y="245" width="480" height="30" rx="4" fill="#607D8B" stroke="#37474F"/>
  <text x="280" y="265" text-anchor="middle" font-size="10" fill="white">ib_control (lifecycle management)</text>
  <rect x="40" y="280" width="480" height="30" rx="4" fill="#546E7A" stroke="#37474F"/>
  <text x="280" y="300" text-anchor="middle" font-size="10" fill="white">monitor_hostapp_config.sh (config watcher)</text>
  <rect x="40" y="315" width="480" height="30" rx="4" fill="#455A64" stroke="#37474F"/>
  <text x="280" y="335" text-anchor="middle" font-size="10" fill="white">Non-root user: infoblox (UID 1000)</text>
  <text x="40" y="365" font-size="9" fill="#888">Total image size: ~300MB | Splunk home: /opt/splunkforwarder</text>

  <!-- Scripts -->
  <rect x="560" y="65" width="520" height="310" rx="8" fill="white" stroke="#37474F" stroke-width="2" filter="url(#s)"/>
  <text x="820" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474F">Key Scripts &amp; Configuration</text>

  <rect x="580" y="105" width="480" height="55" rx="4" fill="#ECEFF1" stroke="#37474F"/>
  <text x="590" y="125" font-size="10" font-weight="bold" fill="#333">config_writer (Python + Jinja2)</text>
  <text x="590" y="143" font-size="9" fill="#555">Renders inputs.conf, outputs.conf, server.conf from JSON config + templates</text>

  <rect x="580" y="168" width="480" height="55" rx="4" fill="#ECEFF1" stroke="#37474F"/>
  <text x="590" y="188" font-size="10" font-weight="bold" fill="#333">ib_control.reload</text>
  <text x="590" y="206" font-size="9" fill="#555">Restarts splunkd after config changes: stop → config_writer → start</text>

  <rect x="580" y="231" width="480" height="55" rx="4" fill="#ECEFF1" stroke="#37474F"/>
  <text x="590" y="251" font-size="10" font-weight="bold" fill="#333">monitor_hostapp_config.sh</text>
  <text x="590" y="269" font-size="9" fill="#555">Watches /data/confd_out/ for config changes → triggers ib_control.reload</text>

  <rect x="580" y="294" width="480" height="55" rx="4" fill="#ECEFF1" stroke="#37474F"/>
  <text x="590" y="314" font-size="10" font-weight="bold" fill="#333">supervisord.conf</text>
  <text x="590" y="332" font-size="9" fill="#555">Manages: splunkd, health_checker, config_monitor processes</text>

  <!-- Config Flow -->
  <rect x="20" y="395" width="1060" height="140" rx="8" fill="white" stroke="#37474F" stroke-width="1" filter="url(#s)"/>
  <text x="550" y="420" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Configuration Rendering Pipeline</text>

  <rect x="40" y="440" width="130" height="45" rx="5" fill="#FFF8E1" stroke="#FF6F00"/>
  <text x="105" y="460" text-anchor="middle" font-size="10" fill="#555">Config Manager</text>
  <text x="105" y="475" text-anchor="middle" font-size="8" fill="#888">JSON config</text>
  <line x1="172" y1="462" x2="208" y2="462" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="210" y="440" width="130" height="45" rx="5" fill="#ECEFF1" stroke="#37474F"/>
  <text x="275" y="460" text-anchor="middle" font-size="10" fill="#555">/data/confd_out/</text>
  <text x="275" y="475" text-anchor="middle" font-size="8" fill="#888">JSON file</text>
  <line x1="342" y1="462" x2="378" y2="462" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="380" y="440" width="140" height="45" rx="5" fill="#ECEFF1" stroke="#37474F"/>
  <text x="450" y="460" text-anchor="middle" font-size="10" fill="#555">config_monitor</text>
  <text x="450" y="475" text-anchor="middle" font-size="8" fill="#888">inotify watch</text>
  <line x1="522" y1="462" x2="558" y2="462" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="560" y="440" width="140" height="45" rx="5" fill="#ECEFF1" stroke="#37474F"/>
  <text x="630" y="460" text-anchor="middle" font-size="10" fill="#555">config_writer</text>
  <text x="630" y="475" text-anchor="middle" font-size="8" fill="#888">Jinja2 render</text>
  <line x1="702" y1="462" x2="738" y2="462" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="740" y="440" width="140" height="45" rx="5" fill="#ECEFF1" stroke="#37474F"/>
  <text x="810" y="460" text-anchor="middle" font-size="10" fill="#555">Splunk Configs</text>
  <text x="810" y="475" text-anchor="middle" font-size="8" fill="#888">inputs/outputs.conf</text>
  <line x1="882" y1="462" x2="918" y2="462" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="920" y="440" width="130" height="45" rx="5" fill="#C8E6C9" stroke="#2E7D32"/>
  <text x="985" y="460" text-anchor="middle" font-size="10" fill="#555">splunkd restart</text>
  <text x="985" y="475" text-anchor="middle" font-size="8" fill="#888">ib_control.reload</text>

  <text x="40" y="520" font-size="9" fill="#888">SSL certificates generated during first boot: self-signed CA → server cert/key in /opt/splunkforwarder/etc/auth/</text>

  <!-- Consumers -->
  <rect x="20" y="555" width="1060" height="125" rx="8" fill="white" stroke="#37474F" stroke-width="1" filter="url(#s)"/>
  <text x="550" y="580" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Consuming Images (Built FROM this base)</text>
  <rect x="40" y="598" width="200" height="35" rx="5" fill="#FCE4EC" stroke="#AD1457"/>
  <text x="140" y="621" text-anchor="middle" font-size="10" fill="#555">cdc.splunk-out</text>
  <rect x="260" y="598" width="200" height="35" rx="5" fill="#FCE4EC" stroke="#AD1457"/>
  <text x="360" y="621" text-anchor="middle" font-size="10" fill="#555">cdc.siem-out</text>
  <rect x="480" y="598" width="200" height="35" rx="5" fill="#FCE4EC" stroke="#AD1457"/>
  <text x="580" y="621" text-anchor="middle" font-size="10" fill="#555">cdc.reporting-out</text>
  <text x="720" y="621" font-size="9" fill="#888">Each adds: monitored directories, healthcheck, specific configs for their data paths</text>
  <text x="40" y="668" font-size="9" fill="#888">Version: Splunk UF 9.1.0 | Alpine + glibc | Python 3 (for config_writer) | supervisord 3.x</text>
</svg>